<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>World Cup Sweepstake</title>
  <style>
    :root {
      --bg: #07111f;
      --card: #111827;
      --text: #f8fafc;
      --muted: #cbd5e1;
      --line: rgba(255,255,255,0.14);
      --accent: #38bdf8;
      --green: #34d399;
      --red: #fb7185;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: radial-gradient(circle at top left, rgba(56,189,248,0.18), transparent 32rem), var(--bg);
      color: var(--text);
    }

    .wrap {
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto;
    }

    header { padding: 34px 0 18px; }

    .hero {
      display: grid;
      grid-template-columns: 1.6fr 1fr;
      gap: 16px;
    }

    .card {
      background: rgba(17,24,39,0.92);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.28);
    }

    .intro, .prize-card, .panel { padding: 22px; }

    h1 {
      margin: 0;
      font-size: clamp(2.1rem, 6vw, 4rem);
      letter-spacing: -0.05em;
      line-height: 0.95;
    }

    h2, h3 { margin-top: 0; }

    .prizes {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 9px;
    }

    .prizes li {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--line);
      color: var(--muted);
    }

    .amount { color: var(--green); font-weight: bold; }

    .status {
      margin: 14px 0;
      padding: 12px 14px;
      border-radius: 12px;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--line);
      color: var(--muted);
    }

    .error {
      color: #fecdd3;
      border-color: rgba(251,113,133,0.45);
      background: rgba(251,113,133,0.12);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin: 16px 0;
    }

    .stat {
      padding: 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--line);
      border-radius: 14px;
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .stat strong {
      display: block;
      margin-top: 4px;
      font-size: 1.45rem;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 10px;
      margin: 16px 0;
    }

    input, select, button {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 11px 12px;
      font: inherit;
      color: var(--text);
      background: #020617;
    }

    button {
      cursor: pointer;
      font-weight: bold;
    }

    button:hover { border-color: var(--accent); }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 18px 0 12px;
    }

    .tab {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.06);
      color: var(--muted);
      padding: 10px 14px;
      border-radius: 999px;
      cursor: pointer;
      font-weight: bold;
    }

    .tab.active {
      color: white;
      background: rgba(56,189,248,0.22);
      border-color: rgba(56,189,248,0.55);
    }

    .view { display: none; }
    .view.active { display: block; }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 12px 10px;
      text-align: left;
      border-bottom: 1px solid var(--line);
    }

    th {
      color: #bae6fd;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      background: rgba(255,255,255,0.04);
    }

    .rank {
      display: inline-grid;
      place-items: center;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      font-weight: bold;
    }

    .rank.gold { color: #fef3c7; background: rgba(250,204,21,0.2); }
    .rank.silver { color: white; background: rgba(229,231,235,0.18); }
    .rank.bronze { color: #ffedd5; background: rgba(251,146,60,0.18); }

    .country { font-weight: bold; }

    .flag-img {
      width: 1.35em;
      height: 1em;
      margin-left: 0.35em;
      vertical-align: -0.12em;
      border-radius: 2px;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.18);
    }
    .participant { color: #e0f2fe; font-weight: bold; }
    .muted { color: var(--muted); }
    .score { font-weight: bold; }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .badge {
      display: inline-flex;
      padding: 5px 8px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.08);
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: bold;
      white-space: nowrap;
    }

    .badge.gold {
      color: #fef3c7;
      background: rgba(250,204,21,0.12);
      border-color: rgba(250,204,21,0.38);
    }

    .badge.green {
      color: #bbf7d0;
      background: rgba(52,211,153,0.12);
      border-color: rgba(52,211,153,0.38);
    }

    .badge.red {
      color: #fecdd3;
      background: rgba(251,113,133,0.12);
      border-color: rgba(251,113,133,0.38);
    }

    .group-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .group-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
    }

    .group-card h3 {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .empty {
      padding: 24px;
      border: 1px dashed var(--line);
      border-radius: 14px;
      color: var(--muted);
      text-align: center;
    }


    .bracket-help {
      color: var(--muted);
      margin: -4px 0 16px;
      line-height: 1.45;
    }

    .bracket-scroll {
      overflow-x: auto;
      padding: 6px 2px 18px;
    }

    .bracket-stage {
      position: relative;
      min-width: 1900px;
    }

    .bracket-lines {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: visible;
      z-index: 1;
    }

    .bracket-lines path {
      fill: none;
      stroke: rgba(255,255,255,0.38);
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .bracket-lines path.dashed {
      stroke: rgba(56,189,248,0.34);
      stroke-dasharray: 5 6;
    }

    .bracket-grid {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns:
        minmax(205px, 1fr)
        minmax(205px, 1fr)
        minmax(205px, 1fr)
        minmax(205px, 1fr)
        minmax(280px, 1.15fr)
        minmax(205px, 1fr)
        minmax(205px, 1fr)
        minmax(205px, 1fr)
        minmax(205px, 1fr);
      gap: 36px;
      align-items: stretch;
    }

    .round-column {
      display: flex;
      flex-direction: column;
      justify-content: space-around;
      gap: 18px;
      min-height: 1260px;
      position: relative;
    }

    .round-column.compact {
      min-height: 880px;
    }

    .round-column.tight {
      min-height: 560px;
    }

    .round-column.semi {
      min-height: 340px;
    }

    .round-column.center {
      min-height: 340px;
      justify-content: center;
      gap: 22px;
    }

    .round-title {
      position: sticky;
      top: 0;
      z-index: 4;
      margin: 0 0 4px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: #bae6fd;
      background: rgba(2,6,23,0.92);
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      text-align: center;
    }

    .match-slot {
      position: relative;
    }

    .match-card {
      position: relative;
      z-index: 3;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(17,24,39,0.98);
      padding: 9px;
      min-height: 92px;
    }

    .match-card.final-card {
      border-color: rgba(250,204,21,0.5);
      background: rgba(65,55,20,0.98);
    }

    .match-card.third-card {
      border-color: rgba(56,189,248,0.38);
      background: rgba(12,43,58,0.98);
    }

    .match-label {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted);
      font-size: 0.74rem;
      margin-bottom: 7px;
    }

    .team-line {
      display: grid;
      grid-template-columns: 1fr;
      gap: 2px;
      padding: 7px 8px;
      border-radius: 10px;
      background: rgba(255,255,255,0.045);
      margin-top: 5px;
      min-height: 39px;
    }

    .team-line.winner {
      color: #bbf7d0;
      background: rgba(52,211,153,0.13);
      border: 1px solid rgba(52,211,153,0.35);
    }

    .team-country {
      display: flex;
      align-items: center;
      gap: 5px;
      font-weight: bold;
      line-height: 1.15;
    }

    .team-player {
      color: var(--muted);
      font-size: 0.78rem;
      line-height: 1.15;
    }

    .team-line.winner .team-player {
      color: #d1fae5;
    }

    .center-title {
      margin: 0 0 6px;
      color: #fef3c7;
      font-size: 0.9rem;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    @media (max-width: 900px) {
      .hero, .controls { grid-template-columns: 1fr; }
      .group-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 600px) {
      .stats { grid-template-columns: 1fr; }
      th, td { padding: 9px 7px; font-size: 0.9rem; }
      .hide-mobile { display: none; }
    }
  </style>
</head>

<body>
  <header class="wrap">
    <div class="hero">
      <section class="card intro">
        <h1>World Cup Sweepstake</h1>
      </section>

      <aside class="card prize-card">
        <h2>Prize pot</h2>
        <ul class="prizes">
          <li><strong>1st Place</strong><span class="amount">&pound;100</span></li>
          <li><strong>2nd Place</strong><span class="amount">&pound;40</span></li>
          <li><strong>3rd Place</strong><span class="amount">&pound;20</span></li>
          <li><strong>Loser</strong><span class="amount">&pound;20</span></li>
          <li><strong>Top of the group</strong><span class="amount">&pound;5</span></li>
        </ul>
      </aside>
    </div>
  </header>

  <main class="wrap">
    <div id="status" class="status">Loading sheet data...</div>

    <section id="stats" class="stats"></section>

    <section class="controls">
      <input id="searchBox" type="search" placeholder="Search country, participant or group">
      <select id="groupSelect">
        <option value="all">All groups</option>
      </select>
      <button id="refreshButton" type="button">Refresh data</button>
    </section>

    <nav class="tabs">
      <button class="tab active" type="button" data-target="overallView">Group-stage standings</button>
      <button class="tab" type="button" data-target="groupsView">Groups</button>
      <button class="tab" type="button" data-target="knockoutView">Knockout bracket</button>
      <button class="tab" type="button" data-target="prizesView">Prizes</button>
    </nav>

    <section id="overallView" class="card panel view active">
      <h2>Group-stage standings</h2>
      <div id="overallTable"></div>
    </section>

    <section id="groupsView" class="card panel view">
      <h2>Group standings</h2>
      <div id="groupsGrid" class="group-grid"></div>
    </section>

    <section id="knockoutView" class="card panel view">
      <h2>Knockout bracket</h2>
      <div id="knockoutTable"></div>
    </section>

    <section id="prizesView" class="card panel view">
      <h2>Current prize positions</h2>
      <div id="prizeTable"></div>
    </section>
  </main>

  <script>
    const SHEET_ID = "1mXNPRmCqN9-Ml1CZxEitWlcjFvjRZHWNEkIzzicNeAQ";
    const COMPETITION_URL = "https://docs.google.com/spreadsheets/d/" + SHEET_ID + "/gviz/tq?gid=1496784945&headers=1";
    const KNOCKOUT_URL = "https://docs.google.com/spreadsheets/d/" + SHEET_ID + "/gviz/tq?sheet=Knockout&headers=1";

    let rows = [];
    let knockoutRows = [];
    let knockoutError = "";
    let searchText = "";
    let selectedGroup = "all";

    const prizeAmounts = {
      first: "&pound;100",
      second: "&pound;40",
      third: "&pound;20",
      loser: "&pound;20",
      group: "&pound;5"
    };

    function byId(id) {
      return document.getElementById(id);
    }

    function clean(value) {
      return String(value == null ? "" : value).trim();
    }

    function lower(value) {
      return clean(value).toLowerCase();
    }

    function toScore(value) {
      const parsed = Number(String(value == null ? "" : value).replace(/[^0-9.-]/g, ""));
      return Number.isFinite(parsed) ? parsed : 0;
    }

    function escapeHtml(value) {
      return String(value == null ? "" : value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    const countryCodes = {
      "mexico": "mx",
      "south africa": "za",
      "korea": "kr",
      "czechia": "cz",
      "canada": "ca",
      "bosnia": "ba",
      "qatar": "qa",
      "switzerland": "ch",
      "brazil": "br",
      "morocco": "ma",
      "haiti": "ht",
      "scotland": "gb-sct",
      "usa": "us",
      "paraguay": "py",
      "australia": "au",
      "türkiye": "tr",
      "turkiye": "tr",
      "turkey": "tr",
      "germany": "de",
      "curaçao": "cw",
      "curacao": "cw",
      "ivory coast": "ci",
      "ecuador": "ec",
      "netherlands": "nl",
      "japan": "jp",
      "sweden": "se",
      "tunisia": "tn",
      "belgium": "be",
      "egypt": "eg",
      "iran": "ir",
      "new zealand": "nz",
      "spain": "es",
      "cape verde": "cv",
      "saudi arabia": "sa",
      "uruguay": "uy",
      "france": "fr",
      "senegal": "sn",
      "iraq": "iq",
      "norway": "no",
      "argentina": "ar",
      "algeria": "dz",
      "austria": "at",
      "jordan": "jo",
      "portugal": "pt",
      "dr congo": "cd",
      "uzbekistan": "uz",
      "colombia": "co",
      "england": "gb-eng",
      "croatia": "hr",
      "ghana": "gh",
      "panama": "pa"
    };

    function twemojiSlugForCode(code) {
      if (code === "gb-eng") {
        return "1f3f4-e0067-e0062-e0065-e006e-e0067-e007f";
      }

      if (code === "gb-sct") {
        return "1f3f4-e0067-e0062-e0073-e0063-e0074-e007f";
      }

      const letters = code.toUpperCase().split("");
      const base = 0x1f1e6;

      return letters
        .map(function(letter) {
          return (base + letter.charCodeAt(0) - 65).toString(16);
        })
        .join("-");
    }

    function flagImageForCountry(country) {
      const code = countryCodes[lower(country)];

      if (!code) {
        return "";
      }

      const slug = twemojiSlugForCode(code);
      const url = "https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/" + slug + ".svg";

      return '<img class="flag-img" src="' + url + '" alt="">';
    }

    function countryWithFlag(country) {
      return escapeHtml(country) + flagImageForCountry(country);
    }

    function loadGviz(url) {
      return new Promise(function(resolve, reject) {
        const callbackName = "handleSheetData_" + Date.now() + "_" + Math.floor(Math.random() * 100000);
        const script = document.createElement("script");

        window[callbackName] = function(response) {
          delete window[callbackName];
          script.remove();
          resolve(response);
        };

        script.onerror = function() {
          delete window[callbackName];
          script.remove();
          reject(new Error("The Google Sheet could not be loaded."));
        };

        script.src = url +
          "&tqx=" + encodeURIComponent("out:json;responseHandler:" + callbackName) +
          "&cache=" + Date.now();

        document.body.appendChild(script);
      });
    }

    async function loadData() {
      try {
        setStatus("Loading sheet data...", false);

        const competitionResponse = await loadGviz(COMPETITION_URL);
        rows = parseGvizResponse(competitionResponse);

        knockoutError = "";
        try {
          const knockoutResponse = await loadGviz(KNOCKOUT_URL);
          knockoutRows = parseKnockoutResponse(knockoutResponse);
        } catch (error) {
          knockoutRows = [];
          knockoutError = error.message;
        }

        renderAll();
        setStatus("Last updated: " + new Date().toLocaleTimeString(), false);
      } catch (error) {
        console.error(error);
        setStatus("Error: " + error.message, true);
      }
    }

    function parseGvizResponse(response) {
      if (!response || response.status === "error") {
        let message = "Google returned an error.";
        if (response && response.errors && response.errors[0]) {
          message = response.errors[0].detailed_message || response.errors[0].message || message;
        }
        throw new Error(message);
      }

      const table = response.table;

      if (!table || !table.cols || !table.rows) {
        throw new Error("Google returned an unexpected table format.");
      }

      const headers = table.cols.map(function(col) {
        return lower(col.label || col.id);
      });

      const groupIndex = headers.indexOf("group");
      const countryIndex = headers.indexOf("country");
      const participantIndex = headers.indexOf("participant");
      const scoreIndex = headers.indexOf("score");

      if (groupIndex === -1 || countryIndex === -1 || participantIndex === -1 || scoreIndex === -1) {
        throw new Error("The sheet must have these exact headers: Group, Country, Participant, Score");
      }

      return table.rows
        .map(function(row, index) {
          const cells = row.c || [];
          return {
            id: index,
            group: getCell(cells[groupIndex]),
            country: getCell(cells[countryIndex]),
            participant: getCell(cells[participantIndex]),
            score: toScore(getCell(cells[scoreIndex]))
          };
        })
        .filter(function(row) {
          return row.group && row.country;
        });
    }

    function parseKnockoutResponse(response) {
      if (!response || response.status === "error") {
        let message = "Google returned an error.";
        if (response && response.errors && response.errors[0]) {
          message = response.errors[0].detailed_message || response.errors[0].message || message;
        }
        throw new Error(message);
      }

      const table = response.table;

      if (!table || !table.cols || !table.rows) {
        throw new Error("Google returned an unexpected knockout table format.");
      }

      const headers = table.cols.map(function(col) {
        return lower(col.label || col.id).replace(/\s+/g, " ");
      });

      const roundIndex = findHeaderIndex(headers, ["round", "stage"]);
      const matchIndex = findHeaderIndex(headers, ["match", "match no", "match number"]);
      const team1Index = findHeaderIndex(headers, ["team 1", "team1", "country 1", "country1", "home"]);
      const team2Index = findHeaderIndex(headers, ["team 2", "team2", "country 2", "country2", "away"]);
      const winnerIndex = findHeaderIndex(headers, ["winner", "winning team"]);

      if (roundIndex === -1 || team1Index === -1 || team2Index === -1 || winnerIndex === -1) {
        throw new Error("The Knockout tab must have these headers: Round, Match, Team 1, Team 2, Winner");
      }

      return table.rows
        .map(function(row, index) {
          const cells = row.c || [];
          return {
            id: index,
            round: getCell(cells[roundIndex]),
            match: matchIndex === -1 ? String(index + 1) : getCell(cells[matchIndex]),
            team1: getCell(cells[team1Index]),
            team2: getCell(cells[team2Index]),
            winner: getCell(cells[winnerIndex])
          };
        })
        .filter(function(row) {
          return row.round || row.team1 || row.team2 || row.winner;
        });
    }

    function findHeaderIndex(headers, options) {
      for (let i = 0; i < options.length; i++) {
        const found = headers.indexOf(options[i]);
        if (found !== -1) return found;
      }
      return -1;
    }

    function normaliseRound(round) {
      const value = lower(round).replace(/[-_]/g, " ").replace(/\s+/g, " ");

      if (value.includes("32")) return "Round of 32";
      if (value.includes("16")) return "Round of 16";
      if (value.includes("quarter")) return "Quarter-final";
      if (value.includes("semi")) return "Semi-final";
      if (value.includes("third") || value.includes("3rd")) return "Third-place";
      if (value === "final" || value.includes(" final")) return "Final";

      return clean(round) || "Other";
    }

    function roundSortValue(round) {
      const normalised = normaliseRound(round);
      const order = ["Round of 32", "Round of 16", "Quarter-final", "Semi-final", "Final", "Third-place"];
      const index = order.indexOf(normalised);
      return index === -1 ? 99 : index;
    }

    function finalMatch() {
      return knockoutRows.find(function(row) {
        return normaliseRound(row.round) === "Final";
      });
    }

    function thirdPlaceMatch() {
      return knockoutRows.find(function(row) {
        return normaliseRound(row.round) === "Third-place";
      });
    }

    function entryForCountry(country) {
      const wanted = lower(country);
      const found = rows.find(function(row) {
        return lower(row.country) === wanted;
      });

      if (found) return found;

      return {
        country: clean(country),
        participant: "",
        group: "",
        score: ""
      };
    }

    function finalRunnerUpCountry(match) {
      if (!match || !match.winner) return "";
      const winner = lower(match.winner);

      if (match.team1 && lower(match.team1) !== winner) return match.team1;
      if (match.team2 && lower(match.team2) !== winner) return match.team2;

      return "";
    }

    function getCell(cell) {
      if (!cell) return "";
      return clean(cell.f != null ? cell.f : cell.v);
    }

    function setStatus(message, isError) {
      const status = byId("status");
      status.textContent = message;
      status.className = isError ? "status error" : "status";
    }

    function assignedRows() {
      return rows.filter(function(row) {
        return row.participant;
      });
    }

    function visibleRows() {
      const query = lower(searchText);

      return rows.filter(function(row) {
        const matchesSearch =
          !query ||
          lower(row.group).includes(query) ||
          lower(row.country).includes(query) ||
          lower(row.participant).includes(query);

        const matchesGroup = selectedGroup === "all" || row.group === selectedGroup;

        return matchesSearch && matchesGroup;
      });
    }

    function sortHighToLow(list, includeUnassigned) {
      return list
        .slice()
        .filter(function(row) {
          return includeUnassigned || row.participant;
        })
        .sort(function(a, b) {
          return b.score - a.score || a.country.localeCompare(b.country);
        });
    }

    function grouped(list) {
      const output = {};

      list.forEach(function(row) {
        if (!output[row.group]) output[row.group] = [];
        output[row.group].push(row);
      });

      return output;
    }

    function getPrizes() {
      const assigned = assignedRows();
      const lowestScore = assigned.length
        ? Math.min.apply(null, assigned.map(function(row) { return row.score; }))
        : undefined;

      const groupWinners = [];

      Object.entries(grouped(assigned)).forEach(function(entry) {
        const groupName = entry[0];
        const groupRows = entry[1];
        const topScore = Math.max.apply(null, groupRows.map(function(row) { return row.score; }));

        groupRows
          .filter(function(row) {
            return row.score === topScore;
          })
          .forEach(function(row) {
            const copy = Object.assign({}, row);
            copy.prizeGroup = groupName;
            groupWinners.push(copy);
          });
      });

      const final = finalMatch();
      const thirdPlace = thirdPlaceMatch();
      const firstCountry = final && final.winner ? final.winner : "";
      const secondCountry = finalRunnerUpCountry(final);
      const thirdCountry = thirdPlace && thirdPlace.winner ? thirdPlace.winner : "";

      return {
        first: firstCountry ? [entryForCountry(firstCountry)] : [],
        second: secondCountry ? [entryForCountry(secondCountry)] : [],
        third: thirdCountry ? [entryForCountry(thirdCountry)] : [],
        loser: assigned.filter(function(row) { return row.score === lowestScore; }),
        groupWinners: groupWinners
      };
    }

    function sameEntry(a, b) {
      return a.country === b.country && a.participant === b.participant;
    }

    function rankClass(index) {
      if (index === 0) return "gold";
      if (index === 1) return "silver";
      if (index === 2) return "bronze";
      return "";
    }

    function rowBadges(row) {
      const prizes = getPrizes();
      const badges = [];

      if (prizes.first.some(function(entry) { return sameEntry(entry, row); })) {
        badges.push('<span class="badge gold">1st &pound;100</span>');
      }

      if (prizes.second.some(function(entry) { return sameEntry(entry, row); })) {
        badges.push('<span class="badge gold">2nd &pound;40</span>');
      }

      if (prizes.third.some(function(entry) { return sameEntry(entry, row); })) {
        badges.push('<span class="badge gold">3rd &pound;20</span>');
      }

      if (prizes.loser.some(function(entry) { return sameEntry(entry, row); })) {
        badges.push('<span class="badge red">Loser &pound;20</span>');
      }

      if (prizes.groupWinners.some(function(entry) { return sameEntry(entry, row); })) {
        badges.push('<span class="badge green">Top group &pound;5</span>');
      }

      return badges.length
        ? '<div class="badges">' + badges.join("") + "</div>"
        : '<span class="badge">-</span>';
    }

    function renderAll() {
      renderGroupDropdown();
      renderStats();
      renderOverall();
      renderGroups();
      renderKnockout();
      renderPrizes();
    }

    function renderGroupDropdown() {
      const select = byId("groupSelect");
      const current = select.value || "all";
      const groupMap = {};
      const groups = [];

      rows.forEach(function(row) {
        if (!groupMap[row.group]) {
          groupMap[row.group] = true;
          groups.push(row.group);
        }
      });

      groups.sort(function(a, b) {
        return a.localeCompare(b, undefined, { numeric: true });
      });

      select.innerHTML =
        '<option value="all">All groups</option>' +
        groups.map(function(group) {
          return '<option value="' + escapeHtml(group) + '">' + escapeHtml(group) + "</option>";
        }).join("");

      select.value = groups.includes(current) ? current : "all";
      selectedGroup = select.value;
    }

    function renderStats() {
      const prizes = getPrizes();
      const leader = prizes.first[0];
      const loser = prizes.loser[0];

      byId("stats").innerHTML =
        '<div class="stat"><span>Current leader</span><strong>' +
        (leader ? countryWithFlag(leader.country) : "-") +
        "</strong></div>" +
        '<div class="stat"><span>Current lowest</span><strong>' +
        (loser ? countryWithFlag(loser.country) : "-") +
        "</strong></div>";
    }

    function renderOverall() {
      const list = sortHighToLow(visibleRows(), false);

      if (!list.length) {
        byId("overallTable").innerHTML =
          '<div class="empty">No assigned countries match this search/filter yet.</div>';
        return;
      }

      byId("overallTable").innerHTML =
        '<table>' +
          '<thead>' +
            '<tr>' +
              '<th>Rank</th>' +
              '<th>Country</th>' +
              '<th>Participant</th>' +
              '<th>Score</th>' +
              '<th class="hide-mobile">Status</th>' +
            '</tr>' +
          '</thead>' +
          '<tbody>' +
            list.map(function(row, index) {
              return '<tr>' +
                '<td><span class="rank ' + rankClass(index) + '">' + (index + 1) + '</span></td>' +
                '<td><span class="country">' + countryWithFlag(row.country) + '</span><br><span class="muted">' + escapeHtml(row.group) + '</span></td>' +
                '<td class="participant">' + escapeHtml(row.participant) + '</td>' +
                '<td class="score">' + escapeHtml(row.score) + '</td>' +
                '<td class="hide-mobile">' + rowBadges(row) + '</td>' +
              '</tr>';
            }).join("") +
          '</tbody>' +
        '</table>';
    }

    function renderGroups() {
      const groups = grouped(visibleRows());
      const groupNames = Object.keys(groups).sort(function(a, b) {
        return a.localeCompare(b, undefined, { numeric: true });
      });

      if (!groupNames.length) {
        byId("groupsGrid").innerHTML =
          '<div class="empty">No groups match this search/filter.</div>';
        return;
      }

      byId("groupsGrid").innerHTML = groupNames.map(function(groupName) {
        const list = sortHighToLow(groups[groupName], true);

        return '<article class="group-card">' +
          '<h3><span>' + escapeHtml(groupName) + '</span></h3>' +
          '<table>' +
            '<thead>' +
              '<tr>' +
                '<th>#</th>' +
                '<th>Country</th>' +
                '<th>Participant</th>' +
                '<th>Score</th>' +
              '</tr>' +
            '</thead>' +
            '<tbody>' +
              list.map(function(row, index) {
                return '<tr>' +
                  '<td><span class="rank ' + (index === 0 && row.participant ? "gold" : "") + '">' + (index + 1) + '</span></td>' +
                  '<td class="country">' + countryWithFlag(row.country) + '</td>' +
                  '<td>' +
                    (row.participant
                      ? '<span class="participant">' + escapeHtml(row.participant) + '</span>'
                      : '<span class="muted">Unassigned</span>') +
                  '</td>' +
                  '<td class="score">' + escapeHtml(row.score) + '</td>' +
                '</tr>';
              }).join("") +
            '</tbody>' +
          '</table>' +
        '</article>';
      }).join("");
    }

    function renderKnockout() {
      const target = byId("knockoutTable");

      if (knockoutError) {
        target.innerHTML =
          '<div class="empty">Create a sheet tab called <strong>Knockout</strong> with columns: <strong>Round</strong>, <strong>Match</strong>, <strong>Team 1</strong>, <strong>Team 2</strong>, <strong>Winner</strong>. The page will then draw the bracket here.</div>';
        return;
      }

      if (!knockoutRows.length) {
        target.innerHTML =
          '<div class="empty">The Knockout tab is empty. Add the Round and Match rows first, then fill Team 1, Team 2 and Winner as the tournament progresses.</div>';
        return;
      }

      const round32 = getRoundMatches("Round of 32", 16);
      const round16 = getRoundMatches("Round of 16", 8);
      const quarters = getRoundMatches("Quarter-final", 4);
      const semis = getRoundMatches("Semi-final", 2);
      const finalRows = getRoundMatches("Final", 1);
      const thirdRows = getRoundMatches("Third-place", 1);

      const html =
        '<p class="bracket-help">Country boxes include the sweepstake participant from the Competition tab. Lines are drawn between the actual match boxes, so each route feeds into the next round.</p>' +
        '<div class="bracket-scroll">' +
          '<div id="bracketStage" class="bracket-stage">' +
            '<svg id="bracketLines" class="bracket-lines" aria-hidden="true"></svg>' +
            '<div class="bracket-grid">' +
              renderBracketColumn("Round of 32", round32.slice(0, 8), "left", "") +
              renderBracketColumn("Round of 16", round16.slice(0, 4), "left", "compact") +
              renderBracketColumn("Quarter-finals", quarters.slice(0, 2), "left", "tight") +
              renderBracketColumn("Semi-finals", semis.slice(0, 1), "left", "semi") +
              renderCentreColumn(finalRows[0], thirdRows[0]) +
              renderBracketColumn("Semi-finals", semis.slice(1, 2), "right", "semi") +
              renderBracketColumn("Quarter-finals", quarters.slice(2, 4), "right", "tight") +
              renderBracketColumn("Round of 16", round16.slice(4, 8), "right", "compact") +
              renderBracketColumn("Round of 32", round32.slice(8, 16), "right", "") +
            '</div>' +
          '</div>' +
        '</div>';

      target.innerHTML = html;
      requestAnimationFrame(drawKnockoutLines);
    }

    function getRoundMatches(roundName, expectedCount) {
      const matches = knockoutRows
        .filter(function(row) {
          return normaliseRound(row.round) === roundName;
        })
        .sort(function(a, b) {
          return Number(a.match || 0) - Number(b.match || 0);
        });

      const byMatch = {};

      matches.forEach(function(row, index) {
        const number = Number(row.match);
        const key = Number.isFinite(number) && number > 0 ? String(number) : String(index + 1);
        byMatch[key] = row;
      });

      const output = [];

      for (let i = 1; i <= expectedCount; i++) {
        output.push(byMatch[String(i)] || {
          round: roundName,
          match: String(i),
          team1: "",
          team2: "",
          winner: ""
        });
      }

      return output;
    }

    function bracketId(round, match) {
      const normalised = normaliseRound(round);
      let prefix = "other";

      if (normalised === "Round of 32") prefix = "r32";
      if (normalised === "Round of 16") prefix = "r16";
      if (normalised === "Quarter-final") prefix = "qf";
      if (normalised === "Semi-final") prefix = "sf";
      if (normalised === "Final") prefix = "final";
      if (normalised === "Third-place") prefix = "third";

      return prefix + "-" + String(match || "1").replace(/[^0-9a-zA-Z_-]/g, "");
    }

    function renderBracketColumn(title, matches, side, sizeClass) {
      return '<section class="round-column ' + side + ' ' + sizeClass + '">' +
        '<h3 class="round-title">' + escapeHtml(title) + '</h3>' +
        matches.map(function(match) {
          return '<div class="match-slot">' + renderMatchCard(match, "") + '</div>';
        }).join("") +
      '</section>';
    }

    function renderCentreColumn(finalMatchRow, thirdPlaceRow) {
      return '<section class="round-column center">' +
        '<div>' +
          '<h3 class="center-title">Final</h3>' +
          '<div class="match-slot">' + renderMatchCard(finalMatchRow, "final-card") + '</div>' +
        '</div>' +
        '<div>' +
          '<h3 class="center-title">Third-place</h3>' +
          '<div class="match-slot">' + renderMatchCard(thirdPlaceRow, "third-card") + '</div>' +
        '</div>' +
      '</section>';
    }

    function renderMatchCard(match, extraClass) {
      return '<article class="match-card ' + (extraClass || "") + '" data-bracket-id="' + escapeHtml(bracketId(match.round, match.match)) + '">' +
        '<div class="match-label"><span>Match ' + escapeHtml(match.match || '-') + '</span><span>' + escapeHtml(normaliseRound(match.round)) + '</span></div>' +
        renderTeamLine(match.team1, match.winner) +
        renderTeamLine(match.team2, match.winner) +
      '</article>';
    }

    function drawKnockoutLines() {
      const stage = byId("bracketStage");
      const svg = byId("bracketLines");

      if (!stage || !svg || byId("knockoutView").classList.contains("active") === false) {
        return;
      }

      const stageRect = stage.getBoundingClientRect();
      svg.setAttribute("viewBox", "0 0 " + stageRect.width + " " + stageRect.height);
      svg.setAttribute("width", stageRect.width);
      svg.setAttribute("height", stageRect.height);
      svg.innerHTML = "";

      const connections = knockoutConnections();

      connections.forEach(function(connection) {
        const from = findBracketCard(connection.from);
        const to = findBracketCard(connection.to);

        if (!from || !to) return;

        const fromRect = from.getBoundingClientRect();
        const toRect = to.getBoundingClientRect();
        const side = connection.side;

        const startX = side === "left"
          ? fromRect.right - stageRect.left
          : fromRect.left - stageRect.left;
        const startY = fromRect.top + fromRect.height / 2 - stageRect.top;
        const endX = side === "left"
          ? toRect.left - stageRect.left
          : toRect.right - stageRect.left;
        const endY = toRect.top + toRect.height / 2 - stageRect.top;
        const middleX = side === "left"
          ? startX + Math.max(18, (endX - startX) / 2)
          : startX - Math.max(18, (startX - endX) / 2);

        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute("d", "M " + startX + " " + startY + " H " + middleX + " V " + endY + " H " + endX);
        if (connection.dashed) path.setAttribute("class", "dashed");
        svg.appendChild(path);
      });
    }

    function findBracketCard(id) {
      return document.querySelector('[data-bracket-id="' + id + '"]');
    }

    function knockoutConnections() {
      const connections = [];

      function add(from, to, side, dashed) {
        connections.push({ from: from, to: to, side: side, dashed: !!dashed });
      }

      for (let i = 1; i <= 16; i += 2) {
        const target = "r16-" + Math.ceil(i / 2);
        const side = i <= 7 ? "left" : "right";
        add("r32-" + i, target, side, false);
        add("r32-" + (i + 1), target, side, false);
      }

      add("r16-1", "qf-1", "left", false);
      add("r16-2", "qf-1", "left", false);
      add("r16-3", "qf-2", "left", false);
      add("r16-4", "qf-2", "left", false);
      add("qf-1", "sf-1", "left", false);
      add("qf-2", "sf-1", "left", false);
      add("sf-1", "final-1", "left", false);
      add("sf-1", "third-1", "left", true);

      add("r16-5", "qf-3", "right", false);
      add("r16-6", "qf-3", "right", false);
      add("r16-7", "qf-4", "right", false);
      add("r16-8", "qf-4", "right", false);
      add("qf-3", "sf-2", "right", false);
      add("qf-4", "sf-2", "right", false);
      add("sf-2", "final-1", "right", false);
      add("sf-2", "third-1", "right", true);

      return connections;
    }

    function renderTeamLine(team, winner) {
      const isWinner = team && winner && lower(team) === lower(winner);
      const entry = team ? entryForCountry(team) : null;
      const participant = entry && entry.participant ? escapeHtml(entry.participant) : "";
      const countryText = team ? countryWithFlag(team) : '<span class="muted">TBC</span>';
      const playerText = team
        ? (participant ? participant : '<span class="muted">No player yet</span>')
        : '<span class="muted">Awaiting fixture</span>';

      return '<div class="team-line ' + (isWinner ? 'winner' : '') + '">' +
        '<span class="team-country">' + countryText + '</span>' +
        '<span class="team-player">' + playerText + '</span>' +
      '</div>';
    }

    function prizeEntryHtml(entries) {
      if (!entries || !entries.length) {
        return '<span class="muted">-</span>';
      }

      return '<div class="badges">' +
        entries.map(function(row) {
          return '<span class="badge ' + (row.prizeGroup ? "green" : "gold") + '">' +
            escapeHtml(row.participant) +
            " - " +
            countryWithFlag(row.country) +
            (row.prizeGroup ? " (" + escapeHtml(row.prizeGroup) + ")" : "") +
            " - " +
            escapeHtml(row.score) +
          '</span>';
        }).join("") +
      '</div>';
    }

    function renderPrizes() {
      const prizes = getPrizes();

      const prizeRows = [
        ["1st Place", prizeAmounts.first, prizes.first],
        ["2nd Place", prizeAmounts.second, prizes.second],
        ["3rd Place", prizeAmounts.third, prizes.third],
        ["Loser", prizeAmounts.loser, prizes.loser],
        ["Top of the group", prizeAmounts.group, prizes.groupWinners]
      ];

      byId("prizeTable").innerHTML =
        '<table>' +
          '<thead>' +
            '<tr>' +
              '<th>Prize</th>' +
              '<th>Amount</th>' +
              '<th>Current winner(s)</th>' +
            '</tr>' +
          '</thead>' +
          '<tbody>' +
            prizeRows.map(function(row) {
              return '<tr>' +
                '<td><strong>' + row[0] + '</strong></td>' +
                '<td class="score">' + row[1] + '</td>' +
                '<td>' + prizeEntryHtml(row[2]) + '</td>' +
              '</tr>';
            }).join("") +
          '</tbody>' +
        '</table>';
    }

    function bindEvents() {
      byId("refreshButton").addEventListener("click", loadData);

      byId("searchBox").addEventListener("input", function(event) {
        searchText = event.target.value;
        renderAll();
      });

      byId("groupSelect").addEventListener("change", function(event) {
        selectedGroup = event.target.value;
        renderAll();
      });

      document.querySelectorAll(".tab").forEach(function(button) {
        button.addEventListener("click", function() {
          document.querySelectorAll(".tab").forEach(function(tab) {
            tab.classList.remove("active");
          });

          document.querySelectorAll(".view").forEach(function(view) {
            view.classList.remove("active");
          });

          button.classList.add("active");
          byId(button.dataset.target).classList.add("active");

          if (button.dataset.target === "knockoutView") {
            requestAnimationFrame(drawKnockoutLines);
          }
        });
      });

      window.addEventListener("resize", function() {
        requestAnimationFrame(drawKnockoutLines);
      });
    }

    bindEvents();
    loadData();
  </script>
</body>
</html>
