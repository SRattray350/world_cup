<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>World Cup Sweepstake</title>

  <style>
    :root {
      --bg: #07111f;
      --card: #111827;
      --text: #f8fafc;
      --muted: #cbd5e1;
      --line: rgba(255,255,255,0.14);
      --accent: #38bdf8;
      --green: #34d399;
      --red: #fb7185;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: radial-gradient(circle at top left, rgba(56,189,248,0.18), transparent 32rem), var(--bg);
      color: var(--text);
    }

    .wrap {
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto;
    }

    header {
      padding: 34px 0 18px;
    }

    .hero {
      display: grid;
      grid-template-columns: 1.6fr 1fr;
      gap: 16px;
    }

    .card {
      background: rgba(17,24,39,0.92);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.28);
    }

    .intro,
    .prize-card,
    .panel {
      padding: 22px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.1rem, 6vw, 4rem);
      letter-spacing: -0.05em;
      line-height: 0.95;
    }

    h2,
    h3 {
      margin-top: 0;
    }

    .prizes {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 9px;
    }

    .prizes li {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--line);
      color: var(--muted);
    }

    .amount {
      color: var(--green);
      font-weight: bold;
    }

    .status {
      margin: 14px 0;
      padding: 12px 14px;
      border-radius: 12px;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--line);
      color: var(--muted);
    }

    .error {
      color: #fecdd3;
      border-color: rgba(251,113,133,0.45);
      background: rgba(251,113,133,0.12);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin: 16px 0;
    }

    .stat {
      padding: 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--line);
      border-radius: 14px;
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .stat strong {
      display: block;
      margin-top: 4px;
      font-size: 1.45rem;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 10px;
      margin: 16px 0;
    }

    input,
    select,
    button {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 11px 12px;
      font: inherit;
      color: var(--text);
      background: #020617;
    }

    button {
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      border-color: var(--accent);
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 18px 0 12px;
    }

    .tab {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.06);
      color: var(--muted);
      padding: 10px 14px;
      border-radius: 999px;
      cursor: pointer;
      font-weight: bold;
    }

    .tab.active {
      color: white;
      background: rgba(56,189,248,0.22);
      border-color: rgba(56,189,248,0.55);
    }

    .view {
      display: none;
    }

    .view.active {
      display: block;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 12px 10px;
      text-align: left;
      border-bottom: 1px solid var(--line);
    }

    th {
      color: #bae6fd;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      background: rgba(255,255,255,0.04);
    }

    .rank {
      display: inline-grid;
      place-items: center;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      font-weight: bold;
    }

    .rank.gold {
      color: #fef3c7;
      background: rgba(250,204,21,0.2);
    }

    .rank.silver {
      color: white;
      background: rgba(229,231,235,0.18);
    }

    .rank.bronze {
      color: #ffedd5;
      background: rgba(251,146,60,0.18);
    }

    .country {
      font-weight: bold;
    }

    .participant {
      color: #e0f2fe;
      font-weight: bold;
    }

    .muted {
      color: var(--muted);
    }

    .score {
      font-weight: bold;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .badge {
      display: inline-flex;
      padding: 5px 8px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.08);
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: bold;
      white-space: nowrap;
    }

    .badge.gold {
      color: #fef3c7;
      background: rgba(250,204,21,0.12);
      border-color: rgba(250,204,21,0.38);
    }

    .badge.green {
      color: #bbf7d0;
      background: rgba(52,211,153,0.12);
      border-color: rgba(52,211,153,0.38);
    }

    .badge.red {
      color: #fecdd3;
      background: rgba(251,113,133,0.12);
      border-color: rgba(251,113,133,0.38);
    }

    .group-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .group-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
    }

    .group-card h3 {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .empty {
      padding: 24px;
      border: 1px dashed var(--line);
      border-radius: 14px;
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 900px) {
      .hero,
      .controls {
        grid-template-columns: 1fr;
      }

      .group-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 600px) {
      .stats {
        grid-template-columns: 1fr;
      }

      th,
      td {
        padding: 9px 7px;
        font-size: 0.9rem;
      }

      .hide-mobile {
        display: none;
      }
    }
  </style>
</head>

<body>
  <header class="wrap">
    <div class="hero">
      <section class="card intro">
        <h1>World Cup Sweepstake</h1>
      </section>

      <aside class="card prize-card">
        <h2>Prize pot</h2>
        <ul class="prizes">
          <li><strong>1st Place</strong><span class="amount">£100</span></li>
          <li><strong>2nd Place</strong><span class="amount">£40</span></li>
          <li><strong>3rd Place</strong><span class="amount">£20</span></li>
          <li><strong>Loser</strong><span class="amount">£20</span></li>
          <li><strong>Top of the group</strong><span class="amount">£5</span></li>
        </ul>
      </aside>
    </div>
  </header>

  <main class="wrap">
    <div id="status" class="status">Loading sheet data...</div>

    <section id="stats" class="stats"></section>

    <section class="controls">
      <input id="searchBox" type="search" placeholder="Search country, participant or group">
      <select id="groupSelect">
        <option value="all">All groups</option>
      </select>
      <button id="refreshButton" type="button">Refresh data</button>
    </section>

    <nav class="tabs">
      <button class="tab active" type="button" data-target="overallView">Overall standings</button>
      <button class="tab" type="button" data-target="groupsView">Groups</button>
      <button class="tab" type="button" data-target="prizesView">Prizes</button>
    </nav>

    <section id="overallView" class="card panel view active">
      <h2>Overall standings</h2>
      <div id="overallTable"></div>
    </section>

    <section id="groupsView" class="card panel view">
      <h2>Group standings</h2>
      <div id="groupsGrid" class="group-grid"></div>
    </section>

    <section id="prizesView" class="card panel view">
      <h2>Current prize positions</h2>
      <div id="prizeTable"></div>
    </section>
  </main>

  <script>
    const GVIZ_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQUAkR7JxLEFFPqKGBrxL20-0LPdef-_UkqN3CDkk3oqJMDTbVGXz6rfvXr4pTR8ftcP5tI1hNtiJhm/gviz/tq?gid=1496784945&headers=1";

    let rows = [];
    let searchText = "";
    let selectedGroup = "all";

    const prizeAmounts = {
      first: "£100",
      second: "£40",
      third: "£20",
      loser: "£20",
      group: "£5"
    };

    function byId(id) {
      return document.getElementById(id);
    }

    function clean(value) {
      return String(value ?? "").trim();
    }

    function lower(value) {
      return clean(value).toLowerCase();
    }

    function toScore(value) {
      const parsed = Number(String(value ?? "").replace(/[^0-9.-]/g, ""));
      return Number.isFinite(parsed) ? parsed : 0;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function loadData() {
      setStatus("Loading sheet data...", false);

      const callbackName = "handleSheetData_" + Date.now();
      const script = document.createElement("script");

      window[callbackName] = function(response) {
        try {
          rows = parseGvizResponse(response);
          renderAll();
          setStatus("Last updated: " + new Date().toLocaleTimeString(), false);
        } catch (error) {
          console.error(error);
          setStatus("Error: " + error.message, true);
        } finally {
          delete window[callbackName];
          script.remove();
        }
      };

      script.onerror = function() {
        delete window[callbackName];
        script.remove();
        setStatus("Error: The Google Sheet could not be loaded.", true);
      };

      script.src = GVIZ_URL +
        "&tqx=" + encodeURIComponent("out:json;responseHandler:" + callbackName) +
        "&cache=" + Date.now();

      document.body.appendChild(script);
    }

    function parseGvizResponse(response) {
      if (!response || response.status === "error") {
        const message =
          response?.errors?.[0]?.detailed_message ||
          response?.errors?.[0]?.message ||
          "Google returned an error.";
        throw new Error(message);
      }

      const table = response.table;

      if (!table || !table.cols || !table.rows) {
        throw new Error("Google returned an unexpected table format.");
      }

      const headers = table.cols.map(col => lower(col.label || col.id));
      const groupIndex = headers.indexOf("group");
      const countryIndex = headers.indexOf("country");
      const participantIndex = headers.indexOf("participant");
      const scoreIndex = headers.indexOf("score");

      if (
        groupIndex === -1 ||
        countryIndex === -1 ||
        participantIndex === -1 ||
        scoreIndex === -1
      ) {
        throw new Error("The sheet must have these exact headers: Group, Country, Participant, Score");
      }

      return table.rows
        .map((row, index) => {
          const cells = row.c || [];

          return {
            id: index,
            group: getCell(cells[groupIndex]),
            country: getCell(cells[countryIndex]),
            participant: getCell(cells[participantIndex]),
            score: toScore(getCell(cells[scoreIndex]))
          };
        })
        .filter(row => row.group && row.country);
    }

    function getCell(cell) {
      if (!cell) return "";
      return clean(cell.f ?? cell.v ?? "");
    }

    function setStatus(message, isError) {
      const status = byId("status");
      status.textContent = message;
      status.className = isError ? "status error" : "status";
    }

    function assignedRows() {
      return rows.filter(row => row.participant);
    }

    function visibleRows() {
      const query = lower(searchText);

      return rows.filter(row => {
        const matchesSearch =
          !query ||
          lower(row.group).includes(query) ||
          lower(row.country).includes(query) ||
          lower(row.participant).includes(query);

        const matchesGroup =
          selectedGroup === "all" ||
          row.group === selectedGroup;

        return matchesSearch && matchesGroup;
      });
    }

    function sortHighToLow(list, includeUnassigned) {
      return [...list]
        .filter(row => includeUnassigned || row.participant)
        .sort((a, b) => b.score - a.score || a.country.localeCompare(b.country));
    }

    function grouped(list) {
      const output = {};

      list.forEach(row => {
        if (!output[row.group]) output[row.group] = [];
        output[row.group].push(row);
      });

      return output;
    }

    function getPrizes() {
      const assigned = assignedRows();
      const scores = [...new Set(assigned.map(row => row.score))]
        .sort((a, b) => b - a);

      const firstScore = scores[0];
      const secondScore = scores[1];
      const thirdScore = scores[2];
      const lowestScore = assigned.length
        ? Math.min(...assigned.map(row => row.score))
        : undefined;

      const groupWinners = [];

      Object.entries(grouped(assigned)).forEach(([groupName, groupRows]) => {
        const topScore = Math.max(...groupRows.map(row => row.score));
        groupRows
          .filter(row => row.score === topScore)
          .forEach(row => groupWinners.push({ ...row, prizeGroup: groupName }));
      });

      return {
        first: assigned.filter(row => row.score === firstScore),
        second: assigned.filter(row => row.score === secondScore),
        third: assigned.filter(row => row.score === thirdScore),
        loser: assigned.filter(row => row.score === lowestScore),
        groupWinners
      };
    }

    function sameEntry(a, b) {
      return a.country === b.country && a.participant === b.participant;
    }

    function rankClass(index) {
      if (index === 0) return "gold";
      if (index === 1) return "silver";
      if (index === 2) return "bronze";
      return "";
    }

    function rowBadges(row) {
      const prizes = getPrizes();
      const badges = [];

      if (prizes.first.some(entry => sameEntry(entry, row))) {
        badges.push('<span class="badge gold">1st £100</span>');
      }

      if (prizes.second.some(entry => sameEntry(entry, row))) {
        badges.push('<span class="badge gold">2nd £40</span>');
      }

      if (prizes.third.some(entry => sameEntry(entry, row))) {
        badges.push('<span class="badge gold">3rd £20</span>');
      }

      if (prizes.loser.some(entry => sameEntry(entry, row))) {
        badges.push('<span class="badge red">Loser £20</span>');
      }

      if (prizes.groupWinners.some(entry => sameEntry(entry, row))) {
        badges.push('<span class="badge green">Top group £5</span>');
      }

      return badges.length
        ? '<div class="badges">' + badges.join("") + "</div>"
        : '<span class="badge">—</span>';
    }

    function renderAll() {
      renderGroupDropdown();
      renderStats();
      renderOverall();
      renderGroups();
      renderPrizes();
    }

    function renderGroupDropdown() {
      const select = byId("groupSelect");
      const current = select.value || "all";

      const groups = [...new Set(rows.map(row => row.group))]
        .sort((a, b) => a.localeCompare(b, undefined, { numeric: true }));

      select.innerHTML =
        '<option value="all">All groups</option>' +
        groups
          .map(group => '<option value="' + escapeHtml(group) + '">' + escapeHtml(group) + "</option>")
          .join("");

      select.value = groups.includes(current) ? current : "all";
      selectedGroup = select.value;
    }

    function renderStats() {
      const prizes = getPrizes();
      const leader = prizes.first[0];
      const loser = prizes.loser[0];

      byId("stats").innerHTML =
        '<div class="stat"><span>Current leader</span><strong>' +
        (leader ? escapeHtml(leader.country) : "—") +
        "</strong></div>" +
        '<div class="stat"><span>Current lowest</span><strong>' +
        (loser ? escapeHtml(loser.country) : "—") +
        "</strong></div>";
    }

    function renderOverall() {
      const list = sortHighToLow(visibleRows(), false);

      if (!list.length) {
        byId("overallTable").innerHTML =
          '<div class="empty">No assigned countries match this search/filter yet.</div>';
        return;
      }

      byId("overallTable").innerHTML =
        '<table>' +
          '<thead>' +
            '<tr>' +
              '<th>Rank</th>' +
              '<th>Country</th>' +
              '<th>Participant</th>' +
              '<th>Score</th>' +
              '<th class="hide-mobile">Status</th>' +
            '</tr>' +
          '</thead>' +
          '<tbody>' +
            list.map((row, index) =>
              '<tr>' +
                '<td><span class="rank ' + rankClass(index) + '">' + (index + 1) + '</span></td>' +
                '<td><span class="country">' + escapeHtml(row.country) + '</span><br><span class="muted">' + escapeHtml(row.group) + '</span></td>' +
                '<td class="participant">' + escapeHtml(row.participant) + '</td>' +
                '<td class="score">' + escapeHtml(row.score) + '</td>' +
                '<td class="hide-mobile">' + rowBadges(row) + '</td>' +
              '</tr>'
            ).join("") +
          '</tbody>' +
        '</table>';
    }

    function renderGroups() {
      const groups = grouped(visibleRows());
      const groupNames = Object.keys(groups)
        .sort((a, b) => a.localeCompare(b, undefined, { numeric: true }));

      if (!groupNames.length) {
        byId("groupsGrid").innerHTML =
          '<div class="empty">No groups match this search/filter.</div>';
        return;
      }

      byId("groupsGrid").innerHTML = groupNames.map(groupName => {
        const list = sortHighToLow(groups[groupName], true);

        return (
          '<article class="group-card">' +
            '<h3><span>' + escapeHtml(groupName) + '</span></h3>' +
            '<table>' +
              '<thead>' +
                '<tr>' +
                  '<th>#</th>' +
                  '<th>Country</th>' +
                  '<th>Participant</th>' +
                  '<th>Score</th>' +
                '</tr>' +
              '</thead>' +
              '<tbody>' +
                list.map((row, index) =>
                  '<tr>' +
                    '<td><span class="rank ' + (index === 0 && row.participant ? "gold" : "") + '">' + (index + 1) + '</span></td>' +
                    '<td class="country">' + escapeHtml(row.country) + '</td>' +
                    '<td>' +
                      (row.participant
                        ? '<span class="participant">' + escapeHtml(row.participant) + '</span>'
                        : '<span class="muted">Unassigned</span>') +
                    '</td>' +
                    '<td class="score">' + escapeHtml(row.score) + '</td>' +
                  '</tr>'
                ).join("") +
              '</tbody>' +
            '</table>' +
          '</article>'
        );
      }).join("");
    }

    function prizeEntryHtml(entries) {
      if (!entries || !entries.length) {
        return '<span class="muted">—</span>';
      }

      return (
        '<div class="badges">' +
          entries.map(row =>
            '<span class="badge ' + (row.prizeGroup ? "green" : "gold") + '">' +
              escapeHtml(row.participant) +
              " — " +
              escapeHtml(row.country) +
              (row.prizeGroup ? " (" + escapeHtml(row.prizeGroup) + ")" : "") +
              " — " +
              escapeHtml(row.score) +
            '</span>'
          ).join("") +
        '</div>'
      );
    }

    function renderPrizes() {
      const prizes = getPrizes();

      const prizeRows = [
        ["1st Place", prizeAmounts.first, prizes.first],
        ["2nd Place", prizeAmounts.second, prizes.second],
        ["3rd Place", prizeAmounts.third, prizes.third],
        ["Loser", prizeAmounts.loser, prizes.loser],
        ["Top of the group", prizeAmounts.group, prizes.groupWinners]
      ];

      byId("prizeTable").innerHTML =
        '<table>' +
          '<thead>' +
            '<tr>' +
              '<th>Prize</th>' +
              '<th>Amount</th>' +
              '<th>Current winner(s)</th>' +
            '</tr>' +
          '</thead>' +
          '<tbody>' +
            prizeRows.map(row =>
              '<tr>' +
                '<td><strong>' + row[0] + '</strong></td>' +
                '<td class="score">' + row[1] + '</td>' +
                '<td>' + prizeEntryHtml(row[2]) + '</td>' +
              '</tr>'
            ).join("") +
          '</tbody>' +
        '</table>';
    }

    function bindEvents() {
      byId("refreshButton").addEventListener("click", loadData);

      byId("searchBox").addEventListener("input", function(event) {
        searchText = event.target.value;
        renderAll();
      });

      byId("groupSelect").addEventListener("change", function(event) {
        selectedGroup = event.target.value;
        renderAll();
      });

      document.querySelectorAll(".tab").forEach(button => {
        button.addEventListener("click", function() {
          document.querySelectorAll(".tab").forEach(tab => tab.classList.remove("active"));
          document.querySelectorAll(".view").forEach(view => view.classList.remove("active"));

          button.classList.add("active");
          byId(button.dataset.target).classList.add("active");
        });
      });
    }

    bindEvents();
    loadData();
  </script>
</body>
</html>
