<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Applied Sciences Sweepstake Wheel</title>

  <style>
    :root {
      --bg: #0b3d24;
      --bg-2: #14532d;
      --card: rgba(9, 55, 33, 0.92);
      --text: #f8fbff;
      --muted: #c8d6ea;
      --line: rgba(255,255,255,0.14);
      --accent: #00c2ff;
      --green: #20d489;
      --gold: #ffd24a;
      --red: #ff6b6b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top center, rgba(255,255,255,0.08), transparent 18rem),
        radial-gradient(circle at 18% 8%, rgba(255,210,74,0.10), transparent 24rem),
        radial-gradient(circle at 82% 2%, rgba(255,255,255,0.08), transparent 20rem),
        linear-gradient(180deg, #1b6b3a 0%, var(--bg-2) 22%, var(--bg) 58%, #072817 100%);
      overflow-x: hidden;
    }

    .wrap {
      width: min(1280px, calc(100% - 32px));
      margin: 0 auto;
      padding: 26px 0 34px;
    }

    header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: center;
      margin-bottom: 18px;
    }

    .title-card {
      padding: 22px 24px;
      border-radius: 24px;
      border: 1px solid var(--line);
      background:
        radial-gradient(circle at top right, rgba(255,210,74,0.18), transparent 14rem),
        radial-gradient(circle at bottom left, rgba(32,212,137,0.18), transparent 16rem),
        linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02)),
        var(--card);
      box-shadow: 0 20px 50px rgba(0,0,0,0.34);
    }

    .kicker {
      display: inline-block;
      margin-bottom: 10px;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.14);
      color: #e9f4ff;
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.2rem, 5vw, 4.4rem);
      letter-spacing: -0.055em;
      line-height: 0.95;
      text-transform: uppercase;
      text-shadow: 0 4px 20px rgba(0,0,0,0.36);
    }

    .subtitle {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.45;
    }

    .status {
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.08);
      color: var(--muted);
      min-width: 260px;
      text-align: right;
      line-height: 1.4;
    }

    .status strong {
      display: block;
      color: var(--text);
      font-size: 1.15rem;
    }

    main {
      display: grid;
      grid-template-columns: minmax(520px, 1.2fr) minmax(320px, 0.8fr);
      gap: 18px;
      align-items: stretch;
    }

    .panel {
      border-radius: 24px;
      border: 1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.015)),
        var(--card);
      box-shadow:
        0 20px 50px rgba(0,0,0,0.34),
        inset 0 1px 0 rgba(255,255,255,0.06);
      padding: 20px;
    }

    .wheel-panel {
      display: grid;
      place-items: center;
      min-height: 680px;
      position: relative;
      overflow: hidden;
      background:
        repeating-linear-gradient(
          180deg,
          rgba(32,212,137,0.07) 0px,
          rgba(32,212,137,0.07) 32px,
          rgba(255,255,255,0.015) 32px,
          rgba(255,255,255,0.015) 64px
        ),
        linear-gradient(180deg, rgba(255,255,255,0.045), rgba(255,255,255,0.012)),
        var(--card);
    }

    .wheel-area {
      position: relative;
      width: min(680px, 90vw);
      aspect-ratio: 1;
      display: grid;
      place-items: center;
    }

    canvas {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 22px 45px rgba(0,0,0,0.35));
      transform: rotate(0deg);
    }

    .pointer {
      position: absolute;
      top: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 24px solid transparent;
      border-right: 24px solid transparent;
      border-top: 48px solid var(--gold);
      filter: drop-shadow(0 5px 8px rgba(0,0,0,0.4));
      z-index: 5;
    }

    .centre-button {
      position: absolute;
      width: 128px;
      height: 128px;
      border-radius: 50%;
      border: 5px solid rgba(255,255,255,0.28);
      background: linear-gradient(135deg, var(--gold), #ffe48e);
      color: #07111f;
      font-size: 1.15rem;
      font-weight: 900;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow:
        0 14px 30px rgba(0,0,0,0.35),
        inset 0 1px 0 rgba(255,255,255,0.5);
      z-index: 4;
    }

    .centre-button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .side-panel {
      display: grid;
      gap: 14px;
      align-content: start;
    }

    .winner-card {
      min-height: 180px;
      display: grid;
      align-content: center;
      text-align: center;
      border-radius: 22px;
      border: 1px solid rgba(255,210,74,0.42);
      background:
        radial-gradient(circle at top, rgba(255,210,74,0.22), transparent 14rem),
        linear-gradient(180deg, rgba(27,107,58,0.75), rgba(9,55,33,0.92));
      padding: 22px;
    }

    .winner-label {
      margin: 0 0 8px;
      color: var(--muted);
      text-transform: uppercase;
      font-size: 0.82rem;
      letter-spacing: 0.08em;
      font-weight: 800;
    }

    .winner-name {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3.4rem);
      line-height: 1.04;
      color: var(--gold);
      text-shadow: 0 5px 20px rgba(0,0,0,0.35);
      overflow-wrap: anywhere;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    button {
      border: 1px solid rgba(255,255,255,0.13);
      border-radius: 16px;
      padding: 13px 14px;
      font: inherit;
      color: var(--text);
      background: rgba(255,255,255,0.07);
      cursor: pointer;
      font-weight: 800;
      transition: all 0.18s ease;
    }

    button:hover {
      transform: translateY(-1px);
      border-color: rgba(0,194,255,0.48);
      box-shadow: 0 8px 18px rgba(0,194,255,0.12);
    }

    button.primary {
      grid-column: span 2;
      background: linear-gradient(135deg, var(--gold), #ffe48e);
      color: #07111f;
      border-color: rgba(255,210,74,0.66);
      box-shadow: 0 8px 22px rgba(255,210,74,0.22);
    }

    button.danger {
      color: #fecdd3;
      border-color: rgba(255,107,107,0.35);
      background: rgba(255,107,107,0.11);
    }

    .names-panel h2 {
      margin: 0 0 12px;
      font-size: 1.1rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .names-list {
      display: grid;
      gap: 7px;
      max-height: 310px;
      overflow: auto;
      padding-right: 4px;
    }

    .name-pill {
      padding: 9px 11px;
      border-radius: 999px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.10);
      color: #e0f2fe;
      font-weight: 800;
    }

    .drawn {
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.45;
    }

    .error {
      color: #fecdd3;
    }

    .drawn-list {
      display: grid;
      gap: 7px;
      max-height: 260px;
      overflow: auto;
      padding-right: 4px;
    }

    .drawn-pill {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      padding: 8px 9px 8px 11px;
      border-radius: 14px;
      background: rgba(32,212,137,0.12);
      border: 1px solid rgba(32,212,137,0.25);
      color: #fef3c7;
      font-weight: 800;
    }

    .add-back-button {
      padding: 6px 9px;
      border-radius: 999px;
      font-size: 0.78rem;
      color: #07111f;
      background: linear-gradient(135deg, var(--gold), #ffe48e);
      border-color: rgba(255,210,74,0.50);
      white-space: nowrap;
    }


    .country-panel h2,
    .assignments-panel h2 {
      margin: 0 0 10px;
      font-size: 1.1rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .country-help {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.4;
    }

    .country-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      max-height: 300px;
      overflow: auto;
      padding-right: 4px;
    }

    .country-button {
      display: grid;
      gap: 2px;
      padding: 9px 10px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.07);
      color: var(--text);
      text-align: left;
      font-weight: 800;
      min-width: 0;
    }

    .country-button:hover {
      border-color: rgba(255,210,74,0.52);
      box-shadow: 0 8px 18px rgba(255,210,74,0.12);
    }

    .country-button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .country-group {
      color: var(--muted);
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .assignments-list {
      display: grid;
      gap: 8px;
      max-height: 320px;
      overflow: auto;
      padding-right: 4px;
    }

    .assignment-pill {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      padding: 9px 10px;
      border-radius: 14px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
    }

    .assignment-main {
      display: grid;
      gap: 2px;
      min-width: 0;
    }

    .assignment-person {
      color: #fef3c7;
      font-weight: 900;
      overflow-wrap: anywhere;
    }

    .assignment-country {
      color: #bbf7d0;
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .undo-assignment-button {
      padding: 6px 9px;
      border-radius: 999px;
      font-size: 0.78rem;
      white-space: nowrap;
    }

    .drawn-panel h2 {
      margin: 0 0 12px;
      font-size: 1.1rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }


    @media (max-width: 980px) {
      header,
      main {
        grid-template-columns: 1fr;
      }

      .status {
        text-align: left;
      }

      .wheel-panel {
        min-height: 520px;
      }
    }

    @media (max-width: 620px) {
      .wrap {
        width: min(100% - 18px, 1280px);
        padding-top: 14px;
      }

      .panel,
      .title-card {
        padding: 16px;
      }

      .centre-button {
        width: 100px;
        height: 100px;
        font-size: 0.95rem;
      }

      .pointer {
        border-left-width: 18px;
        border-right-width: 18px;
        border-top-width: 38px;
      }
    }

    @media (min-width: 1200px) {
      body.presentation main {
        grid-template-columns: 1fr;
      }

      body.presentation .side-panel {
        grid-template-columns: 1fr 1fr;
      }

      body.presentation .wheel-panel {
        min-height: 720px;
      }

      body.presentation .wheel-area {
        width: min(740px, 70vh);
      }
    }
  
    .projection-main {
      grid-template-columns: minmax(620px, 1.55fr) minmax(330px, 0.7fr);
      align-items: stretch;
    }

    .projection-panel {
      align-content: start;
    }

    .projection-panel .assignments-panel {
      min-height: 420px;
    }

    .projection-panel .assignments-list {
      max-height: 520px;
    }

    .management-area {
      display: grid;
      grid-template-columns: minmax(240px, 0.85fr) minmax(520px, 1.7fr) minmax(280px, 0.95fr);
      gap: 18px;
      margin-top: 18px;
      align-items: start;
    }

    .management-area .panel h2,
    .controls-panel h2 {
      margin: 0 0 12px;
      font-size: 1.1rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .management-area .country-grid,
    .management-area .drawn-list {
      max-height: 360px;
    }

    .drawn-panel {
      grid-column: span 2;
    }

    .wheel-panel {
      min-height: 650px;
    }

    .wheel-area {
      width: min(720px, 82vh);
    }

    body.spinning .management-area {
      opacity: 0.22;
      pointer-events: none;
      filter: saturate(0.65);
    }

    @media (max-width: 1100px) {
      .projection-main,
      main {
        grid-template-columns: 1fr;
      }

      .management-area {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 720px) {
      .management-area {
        grid-template-columns: 1fr;
      }

      .wheel-panel {
        min-height: 520px;
      }
    }

  
    .flag-img {
      width: 1.35em;
      height: 1em;
      margin-left: 0.35em;
      vertical-align: -0.12em;
      border-radius: 2px;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.18);
    }

    .country-name-with-flag,
    .assignment-country-name {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      min-width: 0;
    }

  
    .world-ranking-badge {
      display: inline-flex;
      width: fit-content;
      margin-top: 4px;
      padding: 3px 7px;
      border-radius: 999px;
      color: #dbeafe;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.16);
      font-size: 0.68rem;
      font-weight: 800;
      line-height: 1.1;
      white-space: nowrap;
    }

    .country-button .world-ranking-badge {
      margin-top: 4px;
    }

    .assignment-country .world-ranking-badge {
      margin-left: 0;
      margin-top: 4px;
    }

    .assignment-group-block {
      display: grid;
      gap: 8px;
      margin-bottom: 12px;
    }

    .assignment-group-title {
      display: flex;
      align-items: center;
      gap: 9px;
      margin: 2px 0 0;
      padding: 8px 10px;
      border-radius: 14px;
      color: #07111f;
      background: linear-gradient(135deg, var(--gold), #ffe48e);
      font-size: 0.82rem;
      font-weight: 1000;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .assignment-group-count {
      margin-left: auto;
      padding: 3px 8px;
      border-radius: 999px;
      background: rgba(7,17,31,0.12);
      font-size: 0.72rem;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }

  
    .anthem-note {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.86rem;
      line-height: 1.35;
    }



    /* ------------------------------------------------------------
       Country card layout fix
       Prevents flags and world ranking badges from clipping out of
       the country boxes in the "Pick their country" section.
    ------------------------------------------------------------ */
    .country-grid {
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 10px;
      overflow-x: hidden;
    }

    .country-button {
      width: 100%;
      min-width: 0;
      min-height: 84px;
      align-content: start;
      overflow: visible;
      line-height: 1.2;
    }

    .country-button > span {
      min-width: 0;
      max-width: 100%;
    }

    .country-name-with-flag,
    .assignment-country-name {
      max-width: 100%;
      min-width: 0;
      flex-wrap: wrap;
      overflow-wrap: anywhere;
      white-space: normal;
      line-height: 1.25;
    }

    .flag-img {
      flex: 0 0 auto;
      display: inline-block;
      margin-left: 0;
    }

    .world-ranking-badge {
      max-width: 100%;
      width: fit-content;
      white-space: normal;
      overflow-wrap: anywhere;
      line-height: 1.25;
    }

    .country-button .world-ranking-badge {
      margin-top: 5px;
    }

    .assignment-pill {
      grid-template-columns: minmax(0, 1fr) auto;
    }

    .assignment-main,
    .assignment-country {
      min-width: 0;
    }


    /* ------------------------------------------------------------
       Live draw usability improvements
       Adds a clear assignment prompt, a country search box, and
       safer labels for already-assigned drawn participants.
    ------------------------------------------------------------ */
    .country-assign-prompt {
      margin: 0 0 10px;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid rgba(255,210,74,0.32);
      background: rgba(255,210,74,0.10);
      color: #fef3c7;
      font-weight: 900;
      line-height: 1.3;
    }

    .country-search {
      width: 100%;
      margin: 0 0 10px;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.08);
      color: var(--text);
      font: inherit;
      font-weight: 700;
      outline: none;
    }

    .country-search::placeholder {
      color: var(--muted);
    }

    .country-search:focus {
      border-color: rgba(255,210,74,0.58);
      box-shadow: 0 0 0 3px rgba(255,210,74,0.12);
    }

    .drawn-assigned-label {
      padding: 6px 9px;
      border-radius: 999px;
      font-size: 0.78rem;
      color: #bbf7d0;
      background: rgba(32,212,137,0.14);
      border: 1px solid rgba(32,212,137,0.28);
      white-space: nowrap;
    }

    .drawn-pending-label {
      padding: 6px 9px;
      border-radius: 999px;
      font-size: 0.78rem;
      color: #fef3c7;
      background: rgba(255,210,74,0.14);
      border: 1px solid rgba(255,210,74,0.28);
      white-space: nowrap;
    }


    /* ------------------------------------------------------------
       Secret number-to-country reveal
       Numbers can be randomised without exposing the full lookup.
       The organiser only reveals the single number that was picked.
    ------------------------------------------------------------ */
    .number-panel {
      grid-column: span 3;
      align-self: stretch;
    }

    .controls-panel {
      grid-column: span 1;
    }

    .drawn-panel {
      grid-column: span 4;
    }

    .number-controls {
      display: grid;
      grid-template-columns: minmax(200px, 1fr) auto auto;
      gap: 10px;
      margin-bottom: 10px;
    }

    .number-controls .primary {
      min-width: 0;
    }

    .number-map-info {
      margin: 0 0 12px;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid rgba(255,210,74,0.32);
      background: rgba(255,210,74,0.10);
      color: #fef3c7;
      font-size: 0.9rem;
      font-weight: 900;
      line-height: 1.35;
    }

    .number-entry-row {
      display: grid;
      grid-template-columns: minmax(160px, 1fr) auto;
      gap: 10px;
      margin-bottom: 12px;
    }

    .number-input {
      width: 100%;
      min-width: 0;
      padding: 13px 14px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.08);
      color: var(--text);
      font: inherit;
      font-size: 1.25rem;
      font-weight: 900;
      text-align: center;
      outline: none;
    }

    .number-input::placeholder {
      color: var(--muted);
      font-size: 1rem;
      font-weight: 800;
    }

    .number-input:focus {
      border-color: rgba(255,210,74,0.58);
      box-shadow: 0 0 0 3px rgba(255,210,74,0.12);
    }

    .number-reveal-card {
      min-height: 132px;
      display: grid;
      align-content: center;
      gap: 7px;
      margin-bottom: 14px;
      padding: 18px;
      border-radius: 20px;
      border: 1px solid rgba(255,210,74,0.38);
      background:
        radial-gradient(circle at top right, rgba(255,210,74,0.18), transparent 13rem),
        rgba(255,255,255,0.06);
      text-align: center;
    }

    .number-reveal-card .reveal-label {
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .number-reveal-card .reveal-number {
      color: var(--gold);
      font-size: clamp(1.6rem, 3vw, 2.5rem);
      font-weight: 1000;
      line-height: 1;
    }

    .number-reveal-card .reveal-country {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      gap: 7px;
      color: #bbf7d0;
      font-size: clamp(1.7rem, 3vw, 2.7rem);
      font-weight: 1000;
      line-height: 1.08;
      flex-wrap: wrap;
    }

    .number-reveal-card .reveal-meta {
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 800;
    }

    .number-button-grid {
      display: grid;
      grid-template-columns: repeat(8, minmax(48px, 1fr));
      gap: 8px;
    }

    .number-button {
      min-width: 0;
      min-height: 52px;
      padding: 8px;
      border-radius: 14px;
      color: var(--gold);
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);

      if (code === "gb-eng") {

      if (code === "gb-sct") {

    function anthemFilenameForCountry(country) {
      return anthemFilenamesForCountry(country)[0];
    }

    function anthemUrlForFilename(filename) {
      // Use an absolute URL so audio works reliably from GitHub Pages and from a
      // locally opened copy of the HTML. GitHub Pages paths are case-sensitive.
      const encodedFilename = encodeURIComponent(filename);

      if (window.location.protocol === "file:") {
        return "https://srattray350.github.io/world_cup/audio/anthems/" + encodedFilename;
      }

      return new URL("audio/anthems/" + encodedFilename, window.location.href).href;
    }

    function relativeAnthemPath(filename) {
      return "audio/anthems/" + filename;
    }

    function startAnthemStopTimer(player) {
      if (anthemStopTimer) {
        clearTimeout(anthemStopTimer);
      }

      anthemStopTimer = setTimeout(function() {
        player.pause();
        player.currentTime = 0;
        anthemStopTimer = null;
      }, 15000);
    }

    function tryPlayAnthem(country, filenames, index) {
      const player = byId("anthemPlayer");
      if (!player || !country || !filenames.length) return;

      const filename = filenames[index];
      const url = anthemUrlForFilename(filename);
      const slug = filename.replace(/\.mp3$/i, "");
      const startAt = anthemStartTimes[slug] || anthemStartTimes[slugifyCountry(country)] || anthemStartTimes[lower(country)] || 0;

      player.pause();
      player.removeAttribute("src");
      player.load();
      player.preload = "auto";
      player.src = url;
      player.load();

      player.onloadedmetadata = function() {
        if (startAt > 0) {
          try {
            player.currentTime = startAt;
          } catch (error) {
            console.warn("Could not set anthem start time:", error);
          }
        }
      };

      player.onerror = function() {
        if (index + 1 < filenames.length) {
          console.warn("Anthem file did not load, trying fallback:", url);
          tryPlayAnthem(country, filenames, index + 1);
          return;
        }

        const tried = filenames.map(function(name) {
          return relativeAnthemPath(name);
        }).join(", ");

        console.warn("No anthem file could be loaded for", country, tried);
        setStatus("Country assigned, but no anthem file could be loaded for " + country + ". Tried: " + tried, true);
      };

      const playPromise = player.play();

      if (playPromise && typeof playPromise.then === "function") {
        playPromise.then(function() {
          setStatus("Playing anthem clip for " + country + " from " + relativeAnthemPath(filename) + ".", false);
          startAnthemStopTimer(player);
        }).catch(function(error) {
          console.warn("Anthem could not play:", error, url);

          if (index + 1 < filenames.length && error && error.name === "NotSupportedError") {
            tryPlayAnthem(country, filenames, index + 1);
            return;
          }

          setStatus("Country assigned, but the browser could not play the anthem. Tried: " + relativeAnthemPath(filename) + ". Error: " + (error && error.name ? error.name : error) + ". Direct test URL: " + url, true);
        });
      } else {
        startAnthemStopTimer(player);
      }
    }

    function testAnthemSound() {
      stopAnthem();
      setStatus("Testing anthem sound with audio/anthems/algeria.mp3", false);
      tryPlayAnthem("Algeria", ["algeria.mp3"], 0);

    function stopAnthem() {
      const player = byId("anthemPlayer");
      if (!player) return;

      if (anthemStopTimer) {
        clearTimeout(anthemStopTimer);
        anthemStopTimer = null;
      }

      player.pause();
      player.currentTime = 0;

    function playAnthemForCountry(country) {
      const player = byId("anthemPlayer");
      if (!player || !country) return;

      if (anthemStopTimer) {
        clearTimeout(anthemStopTimer);
        anthemStopTimer = null;
      }

      tryPlayAnthem(country, anthemFilenamesForCountry(country), 0);
    }




    function loadGviz(url) {
      return new Promise(function(resolve, reject) {
        const callbackName = "handleParticipants_" + Date.now() + "_" + Math.floor(Math.random() * 100000);
        const script = document.createElement("script");

        window[callbackName] = function(response) {
          delete window[callbackName];
          script.remove();
          resolve(response);
        };

        script.onerror = function() {
          delete window[callbackName];
          script.remove();
          reject(new Error("The Google Sheet could not be loaded."));
        };

        script.src = url +
          "&tqx=" + encodeURIComponent("out:json;responseHandler:" + callbackName) +
          "&cache=" + Date.now();

        document.body.appendChild(script);
      });
    }

    async function loadParticipants() {
      try {
        setStatus("Loading participants and countries...", false);

        const participantResponse = await loadGviz(PARTICIPANTS_URL);
        const competitionResponse = await loadGviz(COMPETITION_URL);

        originalParticipants = parseParticipants(participantResponse);
        countries = parseCountries(competitionResponse);
        countryNumberMap = loadSavedCountryNumberMap();
        if (!isCountryNumberMapValid(countryNumberMap)) {
          countryNumberMap = [];
          clearSavedCountryNumberMap();
        }
        assignments = loadSavedAssignments();
        selectedName = loadPendingDraw();
        heldParticipantOnWheel = loadHeldParticipantOnWheel();

        const assignedPeople = assignmentPeopleMap();
        const selectedIsValid = selectedName &&
          originalParticipants.some(function(name) { return lower(name) === lower(selectedName); }) &&
          !assignedPeople[lower(selectedName)];

        if (!selectedIsValid) {
          selectedName = "";
          clearPendingDraw();
        }

        const heldParticipantIsValid = heldParticipantOnWheel &&
          originalParticipants.some(function(name) { return lower(name) === lower(heldParticipantOnWheel); }) &&
          assignedPeople[lower(heldParticipantOnWheel)];

        if (!heldParticipantIsValid) {
          heldParticipantOnWheel = "";
          clearHeldParticipantOnWheel();
        }

        participants = originalParticipants.filter(function(name) {
          const key = lower(name);
          return !assignedPeople[key] ||
            (selectedName && key === lower(selectedName)) ||
            (heldParticipantOnWheel && key === lower(heldParticipantOnWheel));
        });

        drawnParticipants = selectedName ? [selectedName] : [];
        currentRotation = 0;

        drawWheel();
        renderNames();
        renderDrawnInfo();
        renderDrawnList();
        renderCountryGrid();
        renderAssignments();
        renderCountryNumberTable();
        byId("winnerName").textContent = selectedName || heldParticipantOnWheel || "Ready";
        updateCountryPrompt();

        if (selectedName) {
          setStatus("Restored pending draw for " + selectedName + ". Enter their picked number before spinning again.", false);
        } else if (heldParticipantOnWheel) {
          setStatus(heldParticipantOnWheel + " will stay visible on the wheel until the next spin.", false);
        } else {
          setStatus("Loaded " + participants.length + " participants and " + availableCountries().length + " countries.", false);
        }
      } catch (error) {
        console.error(error);
        setStatus("Error: " + error.message, true);
      }
    }

    function parseParticipants(response) {
      if (!response || response.status === "error") {
        let message = "Google returned an error.";
        if (response && response.errors && response.errors[0]) {
          message = response.errors[0].detailed_message || response.errors[0].message || message;
        }
        throw new Error(message);
      }

      const table = response.table;

      if (!table || !table.rows) {
        throw new Error("Google returned an unexpected participant table format.");
      }

      const names = table.rows
        .map(function(row) {
          const cell = row.c && row.c[0] ? row.c[0] : null;
          return clean(cell && (cell.f != null ? cell.f : cell.v));
        })
        .filter(function(name) {
          const value = lower(name);
          return name && value !== "participant" && value !== "participants";
        });

      const seen = {};
      const unique = [];

      names.forEach(function(name) {
        const key = lower(name);
        if (!seen[key]) {
          seen[key] = true;
          unique.push(name);
        }
      });

      if (!unique.length) {
        throw new Error("No participant names were found in the Participants tab.");
      }

      return unique;
    }

    function parseCountries(response) {
      if (!response || response.status === "error") {
        let message = "Google returned an error.";
        if (response && response.errors && response.errors[0]) {
          message = response.errors[0].detailed_message || response.errors[0].message || message;
        }
        throw new Error(message);
      }

      const table = response.table;

      if (!table || !table.cols || !table.rows) {
        throw new Error("Google returned an unexpected country table format.");
      }

      const headers = table.cols.map(function(col) {
        return lower(col.label || col.id).replace(/\s+/g, " ");
      });

      const groupIndex = headers.indexOf("group");
      const countryIndex = headers.indexOf("country");
      const worldRankingIndex = findHeaderIndex(headers, ["world ranking", "ranking", "world rank", "rank"]);

      if (groupIndex === -1 || countryIndex === -1) {
        throw new Error("The Competition tab must have Group and Country columns.");
      }

      return table.rows
        .map(function(row, index) {
          const cells = row.c || [];
          return {
            id: index,
            group: clean(getCell(cells[groupIndex])),
            country: clean(getCell(cells[countryIndex])),
            worldRanking: worldRankingIndex === -1 ? "" : clean(getCell(cells[worldRankingIndex]))
          };
        })
        .filter(function(row) {
          return row.group && row.country;
        });
    }

    function getCell(cell) {
      if (!cell) return "";
      return clean(cell.f != null ? cell.f : cell.v);
    }

    function findHeaderIndex(headers, options) {
      for (let i = 0; i < options.length; i++) {
        const found = headers.indexOf(options[i]);
        if (found !== -1) return found;
      }
      return -1;
    }

    function loadSavedCountryNumberMap() {
      try {

      } catch (error) {

    function saveCountryNumberMap() {

    function clearSavedCountryNumberMap() {

    }

    function isCountryNumberMapValid(map) {
      if (!Array.isArray(map) || !countries.length || map.length !== countries.length) {
        return false;
      }

      const countryNames = countries.map(function(item) {
        return lower(item.country);
      }).sort();

      const mappedNames = map.map(function(item) {
        return lower(item.country);
      }).sort();

      const numbers = map.map(function(item) {
        return Number(item.number);
      }).sort(function(a, b) { return a - b; });

      for (let i = 0; i < countryNames.length; i++) {
        if (countryNames[i] !== mappedNames[i] || numbers[i] !== i + 1) {
          return false;
        }
      }

      return true;
    }

    function shuffleArray(items) {
      const out = items.slice();
      for (let i = out.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        const temp = out[i];
        out[i] = out[j];
        out[j] = temp;
      }
      return out;
    }

    function randomiseCountryNumbers() {
      if (!countries.length) {
        setStatus("Countries have not loaded yet.", true);
        return;
      }

      if (assignments.length && !confirm("Randomise the number-country mapping? Existing participant-country assignments will be kept, but future number reveals will use the new hidden mapping.")) {
        return;
      }

      countryNumberMap = shuffleArray(countries).map(function(item, index) {
        return {
          number: index + 1,
          country: item.country,
          group: item.group,
          worldRanking: item.worldRanking || ""
        };
      });

      lastNumberReveal = null;
      const input = byId("numberInput");
      if (input) input.value = "";
      saveCountryNumberMap();
      renderCountryNumberTable();
      setStatus(isNumberTableVisible ? "Country numbers randomised. The evidence table has been updated." : "Country numbers randomised and kept hidden.", false);
    }

    function countryNumberFor(country) {
      const item = countryNumberMap.find(function(row) {
        return lower(row.country) === lower(country);
      });

      return item ? item.number : "";
    }

    function countryByNumber(number) {
      return countryNumberMap.find(function(row) {
        return Number(row.number) === Number(number);
      }) || null;
    }

    function hideNumberReveal() {
      lastNumberReveal = null;
      renderCountryNumberTable();

    function toggleNumberTable() {

    function renderFullNumberCountryTable() {
      const panel = byId("numberTablePanel");
      const tableTarget = byId("numberCountryTable");
      const toggleButton = byId("toggleNumberTableButton");

      if (!panel || !tableTarget || !toggleButton) return;

      toggleButton.textContent = isNumberTableVisible ? "Hide number table" : "Show number table";
      panel.hidden = !isNumberTableVisible;

      if (!isNumberTableVisible) {
        tableTarget.innerHTML = "";
        return;
      }

      if (!countryNumberMap.length) {
        tableTarget.innerHTML = '<div class="name-pill">Randomise the numbers first</div>';
        return;
      }

      const assignedCountries = assignmentCountryMap();
      const rows = countryNumberMap
        .slice()
        .sort(function(a, b) { return Number(a.number) - Number(b.number); })
        .map(function(item) {
          const isAssigned = !!assignedCountries[lower(item.country)];
          const statusClass = isAssigned ? "assigned" : "available";
          const statusText = isAssigned ? "Used" : "Hidden";
          const rankText = item.worldRanking ? "#" + escapeHtml(item.worldRanking) : "Not listed";

          return '<tr>' +
            '<td>' + escapeHtml(item.number) + '</td>' +
            '<td>' + countryWithFlag(item.country) + '</td>' +
            '<td>' + escapeHtml(item.group) + '</td>' +
            '<td>' + rankText + '</td>' +
            '<td><span class="number-table-status ' + statusClass + '">' + statusText + '</span></td>' +
          '</tr>';
        })
        .join("");

      tableTarget.innerHTML = '<table class="number-country-table">' +
        '<thead><tr><th>No.</th><th>Country</th><th>Group</th><th>Rank</th><th>Status</th></tr></thead>' +
        '<tbody>' + rows + '</tbody>' +
      '</table>';
    }

    function revealNumberCountry(rawNumber) {
      if (!countryNumberMap.length) {
        setStatus("Randomise the country numbers first.", true);
        return;
      }

      const number = Number(rawNumber);

      if (!Number.isInteger(number) || number < 1 || number > countryNumberMap.length) {
        setStatus("Enter a number between 1 and " + countryNumberMap.length + ".", true);
        return;
      }

      const item = countryByNumber(number);

      if (!item) {
        setStatus("No country is linked to number " + number + ".", true);
        return;
      }

      const assignedCountries = assignmentCountryMap();

      if (assignedCountries[lower(item.country)]) {
        setStatus("Number " + number + " has already been used.", true);
        return;
      }

      if (!selectedName) {
        setStatus("Spin the wheel first, then enter or click their number.", true);
        return;
      }

      const participant = selectedName;

      lastNumberReveal = {
        participant: participant,
        number: item.number,
        country: item.country,
        group: item.group,
        worldRanking: item.worldRanking || ""
      };

      assignCountryToSelected(item.country);
    }

        return;

      card.innerHTML =
        '<span class="reveal-label">' + escapeHtml(lastNumberReveal.participant) + ' picked</span>' +
        '<span class="reveal-number">No. ' + escapeHtml(lastNumberReveal.number) + '</span>' +
        '<span class="reveal-country">' + countryWithFlag(lastNumberReveal.country) + '</span>' +
        '<span class="reveal-meta">' + escapeHtml(lastNumberReveal.group) + ' · ' + rankText + '</span>';
    }

    function renderCountryNumberTable() {
      const info = byId("numberMapInfo");
      const input = byId("numberInput");
      const revealButton = byId("revealNumberButton");
      const grid = byId("numberButtonGrid");

      if (!info || !input || !revealButton || !grid) return;

      if (!countryNumberMap.length) {
        info.textContent = countries.length
          ? "Numbers have not been randomised yet."
          : "Load countries first, then randomise the numbers.";
        input.disabled = true;
        revealButton.disabled = true;
        grid.innerHTML = "";
        renderNumberRevealCard();
        renderFullNumberCountryTable();
        return;
      }

      input.disabled = false;
      input.max = String(countryNumberMap.length);
      revealButton.disabled = false;

      const assignedCountries = assignmentCountryMap();
      const assignedCount = countryNumberMap.filter(function(item) {
        return assignedCountries[lower(item.country)];
      }).length;

      info.textContent = countryNumberMap.length + " numbers randomised. " + assignedCount + " used, " + (countryNumberMap.length - assignedCount) + " still available.";

      grid.innerHTML = countryNumberMap.map(function(item) {
        const isAssigned = !!assignedCountries[lower(item.country)];
        const className = isAssigned ? "number-button assigned" : "number-button";
        const disabledAttr = isAssigned ? " disabled" : "";

        return '<button class="' + className + '" type="button" data-number="' + escapeHtml(item.number) + '"' + disabledAttr + ' aria-label="Reveal number ' + escapeHtml(item.number) + '">' +
          escapeHtml(item.number) +
        '</button>';
      }).join("");

      grid.querySelectorAll("[data-number]").forEach(function(button) {
        button.addEventListener("click", function() {
          revealNumberCountry(button.getAttribute("data-number"));
        });
      });

      renderNumberRevealCard();
      renderFullNumberCountryTable();
    }

      });
      return out;
    }

    function assignmentCountryMap() {
      const out = {};
      assignments.forEach(function(item) {
        out[lower(item.country)] = true;
      });
      return out;

    function availableCountries() {
      const assignedCountries = assignmentCountryMap();

    function assignCountryToSelected(countryName) {
      if (!selectedName) {
        setStatus("Spin the wheel first, then enter or click their picked number.", true);
        return;
      }

      const chosen = countries.find(function(item) {
        return lower(item.country) === lower(countryName);
      });

      if (!chosen) return;

      const assignedCountries = assignmentCountryMap();
      if (assignedCountries[lower(chosen.country)]) {
        setStatus(chosen.country + " has already been assigned.", true);
        return;
      }

      const assignedParticipant = selectedName;

      assignments = assignments.filter(function(item) {
        return lower(item.participant) !== lower(assignedParticipant);
      });

      const assignedNumber = countryNumberFor(chosen.country);

      assignments.push({
        participant: assignedParticipant,
        country: chosen.country,
        group: chosen.group,
        worldRanking: chosen.worldRanking || "",
        number: assignedNumber
      });

      saveAssignments();
      heldParticipantOnWheel = assignedParticipant;
      saveHeldParticipantOnWheel();
      selectedName = "";
      clearPendingDraw();
      byId("winnerName").textContent = assignedParticipant;

      renderDrawnList();
      renderCountryGrid();
      renderAssignments();
      renderCountryNumberTable();
      updateCountryPrompt();
      const numberText = assignedNumber ? " (No. " + assignedNumber + ")" : "";
      setStatus(assignedParticipant + " assigned " + chosen.country + numberText + ". They will stay on the wheel until the next spin. Playing anthem clip.", false);
      playAnthemForCountry(chosen.country);
    }

    function undoAssignment(index) {
      const item = assignments[index];
      if (!item) return;

      assignments.splice(index, 1);

      if (!participants.includes(item.participant)) {
        participants.push(item.participant);
      }

      if (!drawnParticipants.includes(item.participant)) {
        drawnParticipants.push(item.participant);
      }

      saveAssignments();
      drawWheel();
      renderNames();
      renderDrawnInfo();
      renderDrawnList();
      renderCountryGrid();
      renderAssignments();
      renderCountryNumberTable();
      if (lower(selectedName) === lower(item.participant)) {
        selectedName = "";
        clearPendingDraw();
      }

      if (lower(heldParticipantOnWheel) === lower(item.participant)) {
        heldParticipantOnWheel = "";
        clearHeldParticipantOnWheel();
      }

      byId("winnerName").textContent = selectedName || heldParticipantOnWheel || "Ready";
      updateCountryPrompt();
      setStatus(item.participant + " was added back.", false);
    }



    function setStatus(message, isError) {
      byId("status").innerHTML = isError
        ? '<span class="error">' + escapeHtml(message) + '</span>'
        : '<strong>' + escapeHtml(message) + '</strong>';
    }

    function textColourForSlice(colour) {
      const lightColours = ["#ffffff", "#f8fafc", "#e5e7eb", "#ffd24a", "#bbf7d0"];
      return lightColours.includes(colour.toLowerCase()) ? "#07111f" : "#f8fbff";
    }

    function drawWheel() {
      const size = canvas.width;
      const radius = size / 2;
      const centre = size / 2;

      ctx.clearRect(0, 0, size, size);

      if (!participants.length) {
        drawEmptyWheel();
        return;
      }

      const slice = (Math.PI * 2) / participants.length;

      ctx.save();
      ctx.translate(centre, centre);
      ctx.rotate(currentRotation);

      participants.forEach(function(name, index) {
        const start = index * slice - Math.PI / 2;
        const end = start + slice;

        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.arc(0, 0, radius - 24, start, end);
        ctx.closePath();
        ctx.fillStyle = colours[index % colours.length];
        ctx.fill();

        ctx.strokeStyle = "rgba(6,21,43,0.45)";
        ctx.lineWidth = 4;
        ctx.stroke();

        ctx.save();
        ctx.rotate(start + slice / 2);
        ctx.textAlign = "right";
        ctx.textBaseline = "middle";
        ctx.fillStyle = textColourForSlice(colours[index % colours.length]);
        ctx.font = participants.length > 36 ? "700 24px Arial" : "800 30px Arial";

        const label = name.length > 18 ? name.slice(0, 17) + "..." : name;
        ctx.fillText(label, radius - 64, 0);
        ctx.restore();
      });

      ctx.beginPath();
      ctx.arc(0, 0, 104, 0, Math.PI * 2);
      ctx.fillStyle = "#06152b";
      ctx.fill();
      ctx.lineWidth = 8;
      ctx.strokeStyle = "rgba(255,255,255,0.25)";
      ctx.stroke();

      ctx.restore();
    }

    function drawEmptyWheel() {
      const size = canvas.width;
      const radius = size / 2;
      const centre = size / 2;

      ctx.clearRect(0, 0, size, size);
      ctx.beginPath();
      ctx.arc(centre, centre, radius - 24, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(255,255,255,0.06)";
      ctx.fill();
      ctx.strokeStyle = "rgba(255,255,255,0.18)";
      ctx.lineWidth = 6;
      ctx.stroke();

      ctx.fillStyle = "#c8d6ea";
      ctx.font = "800 42px Arial";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText("No names left", centre, centre);
    }

    function removeAssignedParticipantsFromWheelBeforeSpin() {
      const assignedPeople = assignmentPeopleMap();
      const beforeCount = participants.length;

      participants = participants.filter(function(name) {
        return !assignedPeople[lower(name)];
      });

      if (heldParticipantOnWheel) {
        heldParticipantOnWheel = "";
        clearHeldParticipantOnWheel();
      }

      if (participants.length !== beforeCount) {
        drawWheel();
        renderNames();
        renderDrawnInfo();
        renderDrawnList();
        renderCountryGrid();
        renderCountryNumberTable();
      }
    }

    function spinWheel() {
      if (isSpinning) return;

      if (selectedName) {
        setStatus("Assign a country to " + selectedName + " before spinning again, or add them back first.", true);
        return;
      }

      removeAssignedParticipantsFromWheelBeforeSpin();

      if (participants.length === 0) {
        drawWheel();
        byId("winnerName").textContent = "Complete";
        setStatus("All participants have been drawn.", false);
        return;
      }

      isSpinning = true;
      document.body.classList.add("spinning");
      byId("spinButton").disabled = true;
      byId("spinButtonSide").disabled = true;
      byId("winnerName").textContent = "Spinning...";

      const winnerIndex = Math.floor(Math.random() * participants.length);
      const slice = (Math.PI * 2) / participants.length;

      // The pointer is at the top of the wheel.
      // The previous version did not account for currentRotation, so later spins could
      // visually land on one slice while selecting another. This calculates the extra
      // rotation needed from the wheel's current position.
      const pointerAngle = -Math.PI / 2;
      const sliceCentre = winnerIndex * slice + slice / 2 - Math.PI / 2;
      const fullSpins = 8 + Math.floor(Math.random() * 4);

      const currentSliceCentreAtScreen = normaliseAngle(currentRotation + sliceCentre);
      const pointerNormalised = normaliseAngle(pointerAngle);
      const neededRotation = normaliseAngle(pointerNormalised - currentSliceCentreAtScreen);

      const startRotation = currentRotation;
      const change = (Math.PI * 2 * fullSpins) + neededRotation;
      const duration = 5200;
      const startTime = performance.now();

      function animate(now) {
        const elapsed = now - startTime;
        const progress = Math.min(elapsed / duration, 1);
        const eased = easeOutCubic(progress);

        currentRotation = startRotation + change * eased;
        drawWheel();

        if (progress < 1) {
          requestAnimationFrame(animate);
        } else {
          currentRotation = normaliseAngle(startRotation + change);
          drawWheel();
          selectedName = participants[winnerIndex];
          savePendingDraw();
          byId("winnerName").textContent = selectedName;

          if (!drawnParticipants.includes(selectedName)) {
            drawnParticipants.push(selectedName);
          }

          renderNames();
          renderDrawnInfo();
          renderDrawnList();
          renderCountryGrid();
          renderCountryNumberTable();
          updateCountryPrompt();
          setStatus(selectedName + " selected. Enter or click their picked number to reveal the country.", false);

          setTimeout(function() {
            drawWheel();
          }, 700);

          isSpinning = false;
          document.body.classList.remove("spinning");
          byId("spinButton").disabled = false;
          byId("spinButtonSide").disabled = false;
        }
      }

      requestAnimationFrame(animate);
    }

    function normaliseAngle(angle) {
      const full = Math.PI * 2;
      return ((angle % full) + full) % full;
    }

    function easeOutCubic(value) {
      return 1 - Math.pow(1 - value, 3);
    }

    function addParticipantBack(name) {
      if (!name) return;

      drawnParticipants = drawnParticipants.filter(function(drawnName) {
        return drawnName !== name;
      });

      if (!participants.includes(name)) {
        participants.push(name);
      }

      if (lower(selectedName) === lower(name)) {
        selectedName = "";
        clearPendingDraw();
      }

      if (lower(heldParticipantOnWheel) === lower(name)) {
        heldParticipantOnWheel = "";
        clearHeldParticipantOnWheel();
      }

      byId("winnerName").textContent = selectedName || heldParticipantOnWheel || "Ready";
      stopAnthem();
      drawWheel();
      renderNames();
      renderDrawnInfo();
      renderDrawnList();
      renderCountryGrid();
      renderAssignments();
      renderCountryNumberTable();
      updateCountryPrompt();
      setStatus(participants.length + " participants on the wheel.", false);
    }

    function addLastBack() {
      if (!drawnParticipants.length) return;
      addParticipantBack(drawnParticipants[drawnParticipants.length - 1]);
    }

    function addAllBack() {
      if (!confirm("Clear the full draw, remove all country assignments, and add everyone back to the wheel?")) return;

      participants = originalParticipants.slice();
      drawnParticipants = [];
      assignments = [];
      saveAssignments();
      selectedName = "";
      heldParticipantOnWheel = "";
      clearPendingDraw();
      clearHeldParticipantOnWheel();
      stopAnthem();
      currentRotation = 0;
      byId("winnerName").textContent = "Ready";
      drawWheel();
      renderNames();
      renderDrawnInfo();
      renderDrawnList();
      renderCountryGrid();
      renderAssignments();
      renderCountryNumberTable();
      updateCountryPrompt();
      setStatus("Full draw cleared. " + participants.length + " participants are back on the wheel.", false);
    }

    function resetWheel() {
      if (!confirm("Reset the wheel while keeping existing country assignments?")) return;

      const assignedPeople = assignmentPeopleMap();

      participants = originalParticipants.filter(function(name) {
        return !assignedPeople[lower(name)];
      });

      drawnParticipants = [];
      selectedName = "";
      heldParticipantOnWheel = "";
      clearPendingDraw();
      clearHeldParticipantOnWheel();
      stopAnthem();
      currentRotation = 0;
      byId("winnerName").textContent = "Ready";
      drawWheel();
      renderNames();
      renderDrawnInfo();
      renderDrawnList();
      renderCountryGrid();
      renderAssignments();
      renderCountryNumberTable();
      updateCountryPrompt();
      setStatus("Wheel reset. Existing country assignments were kept.", false);
    }

    function renderNames() {
      const target = byId("namesList");
      if (!target) return;

      target.innerHTML = participants.map(function(name) {
        return '<div class="name-pill">' + escapeHtml(name) + '</div>';
      }).join("");
    }

    function renderDrawnInfo() {
      if (!drawnParticipants.length) {
        byId("drawnInfo").textContent = "No one has been drawn yet.";
        return;
      }

      byId("drawnInfo").innerHTML =
        "<strong>Drawn:</strong> " + drawnParticipants.map(escapeHtml).join(", ");
    }

    function renderDrawnList() {
      const target = byId("drawnList");

      if (!drawnParticipants.length) {
        target.innerHTML = '<div class="name-pill">No one drawn yet</div>';
        return;
      }

      const assignedPeople = assignmentPeopleMap();

      target.innerHTML = drawnParticipants.map(function(name) {
        const isAssigned = assignedPeople[lower(name)];
        const isPending = selectedName && lower(name) === lower(selectedName);
        const action = isAssigned
          ? '<span class="drawn-assigned-label">Assigned</span>'
          : isPending
            ? '<button class="add-back-button" type="button" data-add-back="' + escapeHtml(name) + '">Add back</button>'
            : '<span class="drawn-pending-label">Drawn</span>';

        return '<div class="drawn-pill">' +
          '<span>' + escapeHtml(name) + '</span>' +
          action +
        '</div>';
      }).join("");

      target.querySelectorAll("[data-add-back]").forEach(function(button) {
        button.addEventListener("click", function() {
          addParticipantBack(button.getAttribute("data-add-back"));
        });
      });
    }

    function renderCountryGrid() {
      const target = byId("countryGrid");
      if (!target) {
        updateCountryPrompt();
        return;
      }

      const searchTerm = countrySearchTerm();
      let available = availableCountries();

      updateCountryPrompt();

      if (searchTerm) {
        available = available.filter(function(item) {
          return lower(item.country).includes(searchTerm) ||
            lower(item.group).includes(searchTerm) ||
            lower(item.worldRanking).includes(searchTerm);
        });
      }

      if (!countries.length) {
        target.innerHTML = '<div class="name-pill">No countries loaded yet</div>';
        return;
      }

      if (!available.length) {
        target.innerHTML = searchTerm
          ? '<div class="name-pill">No matching countries</div>'
          : '<div class="name-pill">All countries assigned</div>';
        return;
      }

      const disabledAttr = selectedName ? "" : " disabled";

      target.innerHTML = available.map(function(item) {
        return '<button class="country-button" type="button" data-country="' + escapeHtml(item.country) + '"' + disabledAttr + '>' +
          '<span>' + countryWithFlag(item.country) + '</span>' +
          '<span>' + worldRankingBadge(item.worldRanking) + '</span>' +
          '<span class="country-group">' + escapeHtml(item.group) + '</span>' +
        '</button>';
      }).join("");

      target.querySelectorAll("[data-country]").forEach(function(button) {
        button.addEventListener("click", function() {
          assignCountryToSelected(button.getAttribute("data-country"));
        });
      });
    }

    function assignmentNumberLabel(item) {
      const number = item.number || countryNumberFor(item.country);
      return number ? " — No. " + escapeHtml(number) : "";
    }

    function normaliseWorldCupGroup(groupName) {
      const value = clean(groupName) || "Ungrouped";

      // World Cup 2026 has groups A-L. Match the actual group label rather than
      // grabbing any capital letter. The old version matched the "p" in "Group",
      // which is why every section appeared as "Group P".
      const groupMatch = value.match(/\bgroup\s*([A-L])\b/i);
      if (groupMatch) {
        return "Group " + groupMatch[1].toUpperCase();
      }

      const singleLetterMatch = value.match(/^([A-L])$/i);
      if (singleLetterMatch) {
        return "Group " + singleLetterMatch[1].toUpperCase();
      }

      return value;
    }

    function groupSortValue(groupName) {
      const value = normaliseWorldCupGroup(groupName);
      const groupMatch = value.match(/\bgroup\s*([A-L])\b/i);

      if (groupMatch) {
        const letter = groupMatch[1].toUpperCase();
        return String(letter.charCodeAt(0) - 64).padStart(2, "0");
      }

      return value.toUpperCase();
    }

    function assignmentGroupTitle(groupName) {
      return normaliseWorldCupGroup(groupName);
    }

    function assignmentCardHtml(item, index) {
      return '<div class="assignment-pill">' +
        '<div class="assignment-main">' +
          '<span class="assignment-person">' + escapeHtml(item.participant) + '</span>' +
          '<span class="assignment-country"><span class="assignment-country-name">' + countryWithFlag(item.country) + '</span></span>' +
          worldRankingBadge(item.worldRanking || (countryInfoFor(item.country) && countryInfoFor(item.country).worldRanking) || "") +
        '</div>' +
        '<button class="undo-assignment-button" type="button" data-undo="' + index + '">Undo</button>' +
      '</div>';
    }

    function renderAssignments() {
      const target = byId("assignmentsList");

      if (!assignments.length) {
        target.innerHTML = '<div class="name-pill">No countries assigned yet</div>';
        return;
      }

      const groups = {};

      assignments.forEach(function(item, index) {
        const key = assignmentGroupTitle(item.group);
        if (!groups[key]) groups[key] = [];
        groups[key].push({ item: item, index: index });
      });

      const groupKeys = Object.keys(groups).sort(function(a, b) {
        return groupSortValue(a).localeCompare(groupSortValue(b), undefined, { numeric: true, sensitivity: "base" });
      });

      target.innerHTML = groupKeys.map(function(groupKey) {
        const entries = groups[groupKey];
        const rows = entries.map(function(entry) {
          return assignmentCardHtml(entry.item, entry.index);
        }).join("");

        return '<section class="assignment-group-block">' +
          '<h3 class="assignment-group-title">' + escapeHtml(assignmentGroupTitle(groupKey)) + '<span class="assignment-group-count">' + entries.length + '/4</span></h3>' +
          rows +
        '</section>';
      }).join("");

      target.querySelectorAll("[data-undo]").forEach(function(button) {
        button.addEventListener("click", function() {
          undoAssignment(Number(button.getAttribute("data-undo")));
        });
      });
    }


    function bindEvents() {
      byId("spinButton").addEventListener("click", spinWheel);
      byId("spinButtonSide").addEventListener("click", spinWheel);
      byId("addLastBackButton").addEventListener("click", addLastBack);
      byId("addAllBackButton").addEventListener("click", addAllBack);
      byId("resetButton").addEventListener("click", resetWheel);
      byId("reloadButton").addEventListener("click", loadParticipants);
      byId("testAnthemButton").addEventListener("click", testAnthemSound);
      byId("randomiseNumbersButton").addEventListener("click", randomiseCountryNumbers);
      byId("toggleNumberTableButton").addEventListener("click", toggleNumberTable);
      byId("hideNumberRevealButton").addEventListener("click", hideNumberReveal);
      byId("revealNumberButton").addEventListener("click", function() {
        revealNumberCountry(byId("numberInput").value);
      });

      const numberInput = byId("numberInput");
      if (numberInput) {
        numberInput.addEventListener("keydown", function(event) {
          if (event.key === "Enter") {
            event.preventDefault();
            revealNumberCountry(numberInput.value);
          }
        });
      }

      const countrySearch = byId("countrySearch");
      if (countrySearch) {
        countrySearch.addEventListener("input", renderCountryGrid);
      }

      window.addEventListener("resize", drawWheel);

      document.addEventListener("keydown", function(event) {
        if (event.code === "Space") {
          event.preventDefault();
          spinWheel();
        }

      });
    }

    bindEvents();
    loadParticipants();
  </script>
</body>
